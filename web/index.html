<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>osmo_egprs — Operations Console</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  /* ═══ Theme variables ═══ */
  [data-theme="dark"] {
    --bg-0: #0b0e14; --bg-1: #10141c; --bg-2: #161c28; --bg-3: #1e2636;
    --bg-4: #283040; --bg-5: #323e52;
    --border: #1e2a3a; --border-b: #2e3e54;
    --t0: #ecf0f6; --t1: #b0bcd0; --t2: #728aa8; --t3: #485a74;
    --green: #22d67a; --red: #f05555; --amber: #f0a820;
    --cyan: #28c8e0; --blue: #4888ff; --purple: #a070ff; --pink: #f060a0;
    --term-bg: #080a0f; --term-text: #c8d4e0;
    --glow-g: 0 0 6px rgba(34,214,122,0.25);
    --glow-r: 0 0 6px rgba(240,85,85,0.25);
    --shadow: 0 2px 12px rgba(0,0,0,0.5);
    --logo-filter: none;
  }
  [data-theme="light"] {
    --bg-0: #f4f5f8; --bg-1: #ffffff; --bg-2: #eaecf1; --bg-3: #dde0e8;
    --bg-4: #cfd3dc; --bg-5: #bec4d0;
    --border: #d0d4dc; --border-b: #c0c6d0;
    --t0: #1a1e28; --t1: #3a4050; --t2: #6a7488; --t3: #98a0b0;
    --green: #18a85c; --red: #d03030; --amber: #c08010;
    --cyan: #1098b0; --blue: #3060d0; --purple: #7050c0; --pink: #c04080;
    --term-bg: #1a1e28; --term-text: #c8d4e0;
    --glow-g: 0 0 4px rgba(24,168,92,0.2);
    --glow-r: 0 0 4px rgba(208,48,48,0.2);
    --shadow: 0 2px 8px rgba(0,0,0,0.12);
    --logo-filter: brightness(0.7);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height:100%; background:var(--bg-0); color:var(--t0);
    font-family:'IBM Plex Sans','JetBrains Mono',system-ui,sans-serif;
    font-size:14px; overflow:hidden;
  }

  code, .mono, .vty-screen, .vty-input, .pkt-table, #cap-filter {
    font-family:'JetBrains Mono',monospace;
  }

  /* ═══ Layout de base ═══ */
  #app {
    display: grid;
    grid-template-rows: 44px 1fr 1fr;
    grid-template-columns: 280px 1fr;
    height: 100vh;
  }

  /* ═══ Header responsive ═══ */
  header {
    grid-column: 1 / -1;
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 18px; gap: 14px;
    flex-wrap: wrap;
  }
  
  .logo { 
    font-family:'JetBrains Mono',monospace; 
    font-weight:700; 
    font-size:15px; 
    color:var(--green); 
    letter-spacing:.04em; 
    filter:var(--logo-filter);
    white-space: nowrap;
  }
  
  .sep { 
    width:1px; 
    height:20px; 
    background:var(--border-b); 
  }
  
  .htag { 
    font-size:12px; 
    padding:3px 10px; 
    border-radius:4px; 
    background:var(--bg-3); 
    color:var(--t2);
    white-space: nowrap;
  }
  
  .htag.on { 
    background:rgba(34,214,122,0.1); 
    color:var(--green); 
  }
  
  .hright { 
    margin-left:auto; 
    display:flex; 
    align-items:center; 
    gap:10px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .btn {
    background:var(--bg-3); border:1px solid var(--border-b); color:var(--t1);
    font-family:'IBM Plex Sans',sans-serif; font-size:12px; font-weight:500;
    padding:5px 14px; cursor:pointer; border-radius:4px; transition:all .12s;
    white-space: nowrap;
  }
  
  .btn:hover { background:var(--bg-4); color:var(--t0); }
  .btn.primary { border-color:rgba(34,214,122,0.3); }
  .btn.primary:hover { background:rgba(34,214,122,0.12); color:var(--green); }
  .btn.danger:hover { background:rgba(240,85,85,0.12); color:var(--red); }

  .theme-btn {
    background:var(--bg-3); border:1px solid var(--border-b); color:var(--t2);
    width:34px; height:34px; border-radius:50%; cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:16px;
    transition:all .2s;
  }
  .theme-btn:hover { background:var(--bg-4); color:var(--t0); }

  .dot { 
    display:inline-block; 
    width:8px; 
    height:8px; 
    border-radius:50%; 
    vertical-align:middle; 
    margin-right:6px; 
  }
  
  .dot.on { 
    background:var(--green); 
    box-shadow:var(--glow-g); 
  }
  
  .dot.off { 
    background:var(--red); 
    box-shadow:var(--glow-r); 
  }

  /* ═══ Panels ═══ */
  .panel { 
    background:var(--bg-1); 
    display:flex; 
    flex-direction:column; 
    overflow:hidden; 
  }
  
  .ph { 
    display:flex; 
    align-items:center; 
    padding:8px 14px; 
    background:var(--bg-2); 
    border-bottom:1px solid var(--border); 
    gap:8px; 
    flex-shrink:0; 
  }
  
  .ph h2 { 
    font-size:12px; 
    font-weight:600; 
    letter-spacing:.06em; 
    text-transform:uppercase; 
    color:var(--t2); 
  }
  
  .ph .badge { 
    font-size:11px; 
    padding:2px 8px; 
    border-radius:10px; 
    background:var(--bg-4); 
    color:var(--t2); 
    margin-left:auto; 
  }
  
  .ph .badge.live { 
    background:rgba(34,214,122,0.1); 
    color:var(--green); 
  }

  .pb { 
    flex:1; 
    overflow-y:auto; 
    padding:8px; 
  }
  
  .pb::-webkit-scrollbar { width:6px; }
  .pb::-webkit-scrollbar-track { background:var(--bg-1); }
  .pb::-webkit-scrollbar-thumb { background:var(--bg-4); border-radius:3px; }

  /* ═══ Left: Operators ═══ */
  #op-panel { 
    grid-row:2/4; 
    grid-column:1; 
    border-right:1px solid var(--border); 
  }

  .op-card { 
    margin:4px 0; 
    background:var(--bg-2); 
    border:1px solid var(--border); 
    border-radius:5px; 
    overflow:hidden; 
  }
  
  .op-card.on { 
    border-left:3px solid var(--green); 
  }
  
  .op-card.off { 
    border-left:3px solid var(--t3); 
    opacity:.45; 
  }
  
  .op-head { 
    padding:10px 12px; 
    cursor:pointer; 
    display:flex; 
    align-items:center; 
    gap:8px; 
  }
  
  .op-head .id { 
    font-family:'JetBrains Mono',monospace; 
    font-weight:700; 
    color:var(--cyan); 
    font-size:14px; 
  }
  
  .op-head .ms { 
    font-size:12px; 
    color:var(--t2); 
    margin-left:auto; 
  }
  
  .op-detail { 
    display:none; 
    padding:6px 12px 10px; 
    font-size:12px; 
    color:var(--t2); 
    border-top:1px solid var(--border); 
  }
  
  .op-card.expanded .op-detail { 
    display:block; 
  }
  
  .op-row { 
    display:flex; 
    justify-content:space-between; 
    padding:3px 0; 
  }
  
  .op-row .v { 
    color:var(--t1); 
    font-family:'JetBrains Mono',monospace; 
    font-size:12px; 
  }
  
  .ms-chip { 
    display:inline-block; 
    font-family:'JetBrains Mono',monospace; 
    font-size:11px; 
    padding:2px 6px; 
    margin:2px; 
    border-radius:3px; 
    background:var(--bg-4); 
    color:var(--amber); 
  }

  /* ═══ Top-right: Capture ═══ */
  #capture-area { 
    grid-row:2; 
    grid-column:2; 
    display:flex; 
    flex-direction:column; 
    overflow:hidden; 
    border-bottom:1px solid var(--border); 
  }
  
  #cap-toolbar { 
    display:flex; 
    align-items:center; 
    padding:6px 10px; 
    gap:8px; 
    background:var(--bg-2); 
    border-bottom:1px solid var(--border); 
    flex-shrink:0; 
    flex-wrap: wrap;
  }
  
  #cap-filter {
    flex: 1 1 200px;
    background:var(--bg-3); 
    border:1px solid var(--border-b); 
    color:var(--t0);
    font-size:13px; 
    padding:5px 10px; 
    outline:none; 
    border-radius:4px;
    min-width: 150px;
  }
  
  #cap-filter:focus { 
    border-color:var(--cyan); 
  }
  
  #cap-filter::placeholder { 
    color:var(--t3); 
  }

  #pkt-list-wrap { 
    flex:1; 
    overflow-y:auto; 
    min-height:0; 
  }
  
  .pkt-table { 
    width:100%; 
    border-collapse:collapse; 
    font-size:12px; 
  }
  
  .pkt-table thead { 
    position:sticky; 
    top:0; 
    z-index:1; 
  }
  
  .pkt-table th {
    background:var(--bg-2); 
    color:var(--t3); 
    font-weight:600; 
    text-align:left;
    padding:5px 8px; 
    font-size:10px; 
    letter-spacing:.06em; 
    text-transform:uppercase;
    border-bottom:1px solid var(--border);
  }
  
  .pkt-table td { 
    padding:4px 8px; 
    border-bottom:1px solid var(--bg-2); 
    white-space:nowrap; 
    overflow:hidden; 
    text-overflow:ellipsis; 
    cursor:pointer; 
  }
  
  .pkt-table tr:hover { 
    background:var(--bg-3); 
  }
  
  .pkt-table tr.selected { 
    background:rgba(40,200,224,0.07); 
  }
  
  .pkt-table tr.flash { 
    animation: pktFlash .4s; 
  }
  
  @keyframes pktFlash { 
    0%{background:rgba(34,214,122,0.08)} 
    100%{background:transparent} 
  }

  .proto { 
    display:inline-block; 
    padding:1px 6px; 
    border-radius:3px; 
    font-size:11px; 
    font-weight:500; 
  }
  
  .proto-rr   { background:rgba(40,200,224,0.1); color:var(--cyan); }
  .proto-mm   { background:rgba(160,112,255,0.1); color:var(--purple); }
  .proto-cc   { background:rgba(240,96,160,0.1); color:var(--pink); }
  .proto-sms  { background:rgba(34,214,122,0.1); color:var(--green); }
  .proto-dtap { background:rgba(72,136,255,0.1); color:var(--blue); }
  .proto-def  { background:var(--bg-4); color:var(--t1); }
  
  .dir-ul { color:var(--red); font-weight:600; font-size:11px; }
  .dir-dl { color:var(--green); font-weight:600; font-size:11px; }

  /* Packet detail panel */
  #pkt-detail-wrap {
    height:180px; 
    min-height:60px; 
    max-height:50%;
    border-top:2px solid var(--border-b); 
    background:var(--bg-1);
    overflow-y:auto; 
    flex-shrink:0; 
    resize:vertical;
  }
  
  #pkt-detail-wrap .ph { 
    position:sticky; 
    top:0; 
    z-index:1; 
  }
  
  #pkt-detail { 
    padding:6px 10px; 
    font-family:'JetBrains Mono',monospace; 
    font-size:12px; 
    line-height:1.7; 
  }
  
  .layer-group { 
    margin:2px 0; 
  }
  
  .layer-name { 
    cursor:pointer; 
    font-weight:600; 
    color:var(--cyan); 
    padding:3px 6px; 
    border-radius:3px; 
    display:flex; 
    align-items:center; 
    gap:6px; 
  }
  
  .layer-name:hover { 
    background:var(--bg-3); 
  }
  
  .layer-name .arrow { 
    font-size:9px; 
    color:var(--t3); 
    transition:transform .15s; 
    display:inline-block; 
  }
  
  .layer-name .arrow.open { 
    transform:rotate(90deg); 
  }
  
  .layer-fields { 
    padding-left:18px; 
    display:none; 
  }
  
  .layer-fields.open { 
    display:block; 
  }
  
  .field-row { 
    color:var(--t2); 
    padding:1px 6px; 
    border-radius:2px; 
  }
  
  .field-row:hover { 
    background:var(--bg-2); 
  }
  
  .field-key { 
    color:var(--t1); 
  }
  
  .field-val { 
    color:var(--amber); 
    margin-left:6px; 
  }

  /* ═══ Bottom: Two VTY consoles ═══ */
  #vty-area {
    grid-row:3; 
    grid-column:2;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
  }

  .vty-box { 
    background:var(--bg-1); 
    display:flex; 
    flex-direction:column; 
    overflow:hidden; 
  }

  .vty-toolbar { 
    display:flex; 
    align-items:center; 
    padding:6px 10px; 
    gap:6px; 
    background:var(--bg-2); 
    border-bottom:1px solid var(--border); 
    flex-shrink:0; 
    flex-wrap:wrap; 
  }
  
  .vty-toolbar select {
    background:var(--bg-3); 
    border:1px solid var(--border-b); 
    color:var(--t0);
    font-family:'JetBrains Mono',monospace; 
    font-size:12px; 
    padding:4px 6px; 
    outline:none; 
    border-radius:3px;
    min-width: 70px;
  }
  
  .vty-toolbar .label { 
    font-size:11px; 
    color:var(--t2); 
    font-weight:600; 
    text-transform:uppercase; 
    letter-spacing:.05em; 
  }

  .vty-screen {
    flex:1; 
    overflow-y:auto; 
    padding:8px 10px;
    font-family:'JetBrains Mono',monospace; 
    font-size:13px; 
    line-height:1.6;
    background:var(--term-bg); 
    color:var(--term-text);
    white-space:pre-wrap; 
    word-break:break-all;
  }
  
  .vty-screen .prompt { color:var(--green); }
  .vty-screen .err { color:var(--red); }
  .vty-screen .sys { color:var(--cyan); font-style:italic; }
  .vty-screen .cmd { color:var(--amber); }

  .vty-input-row { 
    display:flex; 
    border-top:1px solid var(--border); 
    flex-shrink:0; 
    background:var(--bg-2); 
  }
  
  .vty-input-row .prm { 
    padding:7px 10px; 
    color:var(--green); 
    font-family:'JetBrains Mono',monospace; 
    font-weight:600; 
    font-size:13px; 
    white-space:nowrap; 
  }
  
  .vty-input-row input {
    flex:1; 
    background:transparent; 
    border:none; 
    color:var(--t0);
    font-family:'JetBrains Mono',monospace; 
    font-size:13px; 
    padding:7px 0; 
    outline:none;
    min-width: 50px;
  }

  .vty-empty { 
    display:flex; 
    align-items:center; 
    justify-content:center; 
    flex:1; 
    color:var(--t3); 
    font-size:13px; 
    text-align:center; 
    padding:20px; 
    background:var(--term-bg); 
  }

  /* ═══ MEDIA QUERIES - Responsive Design ═══ */
  
  /* Tablettes et petits écrans */
  @media screen and (max-width: 1024px) {
    #app {
      grid-template-columns: 220px 1fr;
    }
    
    .pkt-table th:nth-child(5),
    .pkt-table td:nth-child(5),
    .pkt-table th:nth-child(6),
    .pkt-table td:nth-child(6) {
      display: none; /* Cache TS et FN sur tablettes */
    }
    
    .hright {
      gap: 5px;
    }
    
    .btn {
      padding: 5px 8px;
      font-size: 11px;
    }
  }

  /* Mobiles en mode paysage et petits tablettes */
  @media screen and (max-width: 768px) {
    #app {
      grid-template-rows: auto 1fr 1fr;
      grid-template-columns: 1fr;
    }
    
    header {
      padding: 8px 12px;
      gap: 8px;
    }
    
    .logo {
      font-size: 14px;
    }
    
    .htag {
      font-size: 11px;
      padding: 2px 6px;
    }
    
    .hright {
      width: 100%;
      margin-left: 0;
      justify-content: flex-start;
      order: 3;
    }
    
    #op-panel {
      grid-row: 2;
      grid-column: 1;
      max-height: 30vh;
    }
    
    #capture-area {
      grid-row: 3;
      grid-column: 1;
    }
    
    #vty-area {
      grid-row: 4;
      grid-column: 1;
      grid-template-columns: 1fr;
    }
    
    .pkt-table th:nth-child(4),
    .pkt-table td:nth-child(4) {
      display: none; /* Cache ARFCN sur mobile */
    }
    
    #cap-toolbar {
      flex-direction: column;
      align-items: stretch;
    }
    
    #cap-filter {
      width: 100%;
    }
    
    .vty-toolbar {
      flex-direction: column;
      align-items: stretch;
    }
    
    .vty-toolbar select {
      width: 100%;
    }
  }

  /* Petits mobiles */
  @media screen and (max-width: 480px) {
    header {
      padding: 5px 8px;
    }
    
    .logo {
      font-size: 12px;
    }
    
    .htag {
      font-size: 10px;
      padding: 2px 4px;
    }
    
    .btn {
      padding: 4px 6px;
      font-size: 10px;
    }
    
    .theme-btn {
      width: 28px;
      height: 28px;
      font-size: 14px;
    }
    
    .pkt-table th,
    .pkt-table td {
      padding: 3px 4px;
      font-size: 10px;
    }
    
    .pkt-table th:nth-child(3),
    .pkt-table td:nth-child(3) {
      display: none; /* Cache DIR sur très petits écrans */
    }
    
    .pkt-table th:nth-child(1) {
      width: 30px;
    }
    
    .proto {
      padding: 1px 3px;
      font-size: 9px;
    }
    
    .vty-toolbar .label {
      font-size: 10px;
    }
    
    .vty-screen {
      font-size: 11px;
      padding: 5px;
    }
    
    .vty-input-row .prm {
      font-size: 11px;
      padding: 5px 8px;
    }
    
    .vty-input-row input {
      font-size: 11px;
      padding: 5px 0;
    }
  }

  /* Support pour très grands écrans */
  @media screen and (min-width: 1600px) {
    html, body {
      font-size: 16px;
    }
    
    #app {
      grid-template-columns: 350px 1fr;
    }
    
    .pkt-table {
      font-size: 14px;
    }
    
    .pkt-table th {
      font-size: 12px;
    }
  }

  /* Mode impression */
  @media print {
    #app {
      display: block;
      height: auto;
      overflow: visible;
    }
    
    header, .btn, .vty-input-row, #pkt-detail-wrap {
      display: none;
    }
    
    .pkt-table {
      page-break-inside: avoid;
    }
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <span class="logo">⎔ OSMO_EGPRS</span>
    <span class="sep"></span>
    <span class="htag" id="tag-ops">0 ops</span>
    <span class="htag" id="tag-tshark">tshark off</span>
    <div class="hright">
      <button class="btn primary" onclick="send({type:'tshark_start'})">▶ Capture</button>
      <button class="btn danger" onclick="send({type:'tshark_stop'})">■ Stop</button>
      <button class="btn" onclick="send({type:'poll'})">⟳ Poll</button>
      <button class="btn" onclick="clearPackets()">Clear</button>
      <span class="sep"></span>
      <button class="theme-btn" onclick="toggleTheme()" id="theme-toggle" title="Toggle theme">◐</button>
      <span style="font-size:12px;color:var(--t3)"><span class="dot off" id="ws-dot"></span><span id="ws-txt">—</span></span>
    </div>
  </header>

  <!-- Left: Operators -->
  <div class="panel" id="op-panel">
    <div class="ph"><h2>Operators</h2><span class="badge" id="op-count">0</span></div>
    <div class="pb" id="op-list"></div>
  </div>

  <!-- Top-right: Capture -->
  <div id="capture-area">
    <div id="cap-toolbar">
      <input type="text" id="cap-filter" placeholder="Filter: rr, mm, cc, sms, arfcn=N, ul, dl …" spellcheck="false">
      <span style="font-size:12px;color:var(--t3);white-space:nowrap" id="pkt-counter">0 packets</span>
    </div>
    <div id="pkt-list-wrap">
      <table class="pkt-table">
        <thead><tr>
          <th style="width:50px">#</th>
          <th style="width:85px">TIME</th>
          <th style="width:35px">DIR</th>
          <th style="width:55px">ARFCN</th>
          <th style="width:35px">TS</th>
          <th style="width:75px">FN</th>
          <th style="width:90px">PROTO</th>
          <th>INFO</th>
        </tr></thead>
        <tbody id="pkt-tbody"></tbody>
      </table>
    </div>
    <div id="pkt-detail-wrap">
      <div class="ph"><h2>Packet Detail</h2><span class="badge" id="detail-badge">—</span></div>
      <div id="pkt-detail"><span style="color:var(--t3)">Click a packet to inspect layers</span></div>
    </div>
  </div>

  <!-- Bottom: Two VTY Consoles -->
  <div id="vty-area">
    <!-- VTY 1 -->
    <div class="vty-box" id="vty-box-0">
      <div class="vty-toolbar">
        <span class="label">VTY 1</span>
        <select class="vty-op" data-idx="0"><option value="">OP…</option></select>
        <select class="vty-comp" data-idx="0">
          <option value="bsc">BSC</option><option value="msc">MSC</option><option value="hlr">HLR</option>
          <option value="bts">BTS</option><option value="mgw">MGW</option><option value="stp">STP</option>
          <option value="sgsn">SGSN</option><option value="ggsn">GGSN</option><option value="pcu">PCU</option>
          <option value="baseband">Baseband</option>
        </select>
        <button class="btn primary" onclick="vtyConnect(0)">Connect</button>
        <button class="btn" onclick="vtyClose(0)">Close</button>
      </div>
      <div class="vty-screen" id="vty-screen-0"></div>
      <div class="vty-empty" id="vty-empty-0">Select operator + component → Connect</div>
      <div class="vty-input-row">
        <span class="prm" id="vty-prm-0">$</span>
        <input type="text" class="vty-input" data-idx="0" placeholder="VTY command…"
               onkeydown="vtyKey(event,0)" autocomplete="off" spellcheck="false">
      </div>
    </div>

    <!-- VTY 2 -->
    <div class="vty-box" id="vty-box-1">
      <div class="vty-toolbar">
        <span class="label">VTY 2</span>
        <select class="vty-op" data-idx="1"><option value="">OP…</option></select>
        <select class="vty-comp" data-idx="1">
          <option value="bsc">BSC</option><option value="msc">MSC</option><option value="hlr">HLR</option>
          <option value="bts">BTS</option><option value="mgw">MGW</option><option value="stp">STP</option>
          <option value="sgsn">SGSN</option><option value="ggsn">GGSN</option><option value="pcu">PCU</option>
          <option value="baseband">Baseband</option>
        </select>
        <button class="btn primary" onclick="vtyConnect(1)">Connect</button>
        <button class="btn" onclick="vtyClose(1)">Close</button>
      </div>
      <div class="vty-screen" id="vty-screen-1"></div>
      <div class="vty-empty" id="vty-empty-1">Select operator + component → Connect</div>
      <div class="vty-input-row">
        <span class="prm" id="vty-prm-1">$</span>
        <input type="text" class="vty-input" data-idx="1" placeholder="VTY command…"
               onkeydown="vtyKey(event,1)" autocomplete="off" spellcheck="false">
      </div>
    </div>
  </div>
</div>

<script>
// ═══ Theme ═══════════════════════════════════════════════════
function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('theme-toggle').textContent = next === 'dark' ? '◐' : '◑';
  try { localStorage.setItem('osmo-theme', next); } catch {}
}
try {
  const saved = localStorage.getItem('osmo-theme');
  if (saved) { document.documentElement.dataset.theme = saved; document.getElementById('theme-toggle').textContent = saved === 'dark' ? '◐' : '◑'; }
} catch {}

// ═══ WebSocket ═══════════════════════════════════════════════
const WS_URL = `ws://${location.hostname}:${location.port||80}`;
let ws = null;
let opState = {}, activeOpIds = [];

function connectWs() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => setWs(true);
  ws.onmessage = e => handle(JSON.parse(e.data));
  ws.onclose = () => { setWs(false); setTimeout(connectWs, 2000); };
  ws.onerror = () => {};
}
function setWs(on) {
  document.getElementById('ws-dot').className = 'dot '+(on?'on':'off');
  document.getElementById('ws-txt').textContent = on?'LIVE':'—';
}
function send(msg) { if (ws && ws.readyState===1) ws.send(JSON.stringify(msg)); }

// ═══ Message Router ══════════════════════════════════════════
function handle(msg) {
  switch(msg.type) {
    case 'init':
      activeOpIds = msg.data.activeOpIds||[];
      updateOps(msg.data.operators);
      setTsharkTag(msg.data.tsharkActive || false);
      buildOpSelects();
      break;
    case 'state':
      activeOpIds = msg.data.activeOpIds||activeOpIds;
      updateOps(msg.data.operators);
      buildOpSelects();
      break;
    case 'tshark_status':
      setTsharkTag(msg.data.active);
      break;
    case 'packet': 
      addPacket(msg.data); 
      break;
    case 'tshark_stopped': 
      setTsharkTag(false); 
      break;
    case 'tshark_error':
      setTsharkTag(false);
      document.getElementById('tag-tshark').textContent = 'tshark ERROR';
      break;
    case 'vty_connected': vtyOnConnected(msg.data); break;
    case 'vty_data': vtyOnData(msg.data); break;
    case 'vty_error': vtyOnError(msg.data); break;
    case 'vty_disconnected': vtyOnDisc(msg.data); break;
  }
}

function setTsharkTag(on) {
  const el = document.getElementById('tag-tshark');
  el.textContent = on ? 'tshark ●' : 'tshark off';
  el.className = 'htag' + (on?' on':'');
}

// ═══ Operators ═══════════════════════════════════════════════
function updateOps(ops) {
  opState = ops||{};
  const el = document.getElementById('op-list');
  const ids = Object.keys(opState).map(Number).sort((a,b)=>a-b);
  document.getElementById('op-count').textContent = ids.length;
  document.getElementById('tag-ops').textContent = ids.length+' ops';
  document.getElementById('tag-ops').className = 'htag'+(ids.length?' on':'');

  el.innerHTML = ids.map(id => {
    const op = opState[id], bts = op.components?.bts||{}, mc = op.mobiles?.length||0;
    return `<div class="op-card on" onclick="this.classList.toggle('expanded')">
      <div class="op-head">
        <span class="id">OP${id}</span>
        <span style="font-size:12px;color:var(--t2)">${bts.arfcn!=null?'ARFCN '+bts.arfcn:''}</span>
        <span class="ms">${mc} MS</span>
      </div>
      <div class="op-detail">
        <div class="op-row"><span>BSIC</span><span class="v">${bts.bsic??'—'}</span></div>
        <div class="op-row"><span>LAC</span><span class="v">${bts.lac??'—'}</span></div>
        <div class="op-row"><span>CI</span><span class="v">${bts.ci??'—'}</span></div>
        <div class="op-row"><span>BTS Type</span><span class="v">${bts.type||'—'} ${bts.band||''}</span></div>
        <div class="op-row"><span>TRX</span><span class="v">${bts.trx_count||'—'}</span></div>
        ${mc>0?'<div style="margin-top:6px">'+op.mobiles.map(m=>`<span class="ms-chip">${m.imsi.slice(0,5)}…${m.imsi.slice(12)}${m.msisdn?' / '+m.msisdn:''}</span>`).join('')+'</div>':''}
      </div>
    </div>`;
  }).join('');
}

function buildOpSelects() {
  const ids = activeOpIds.length ? activeOpIds : Object.keys(opState).map(Number).sort((a,b)=>a-b);
  document.querySelectorAll('.vty-op').forEach(sel => {
    const cur = sel.value;
    sel.innerHTML = '<option value="">OP…</option>' + ids.map(i=>`<option value="${i}">OP${i}</option>`).join('');
    if (cur) sel.value = cur;
  });
}

// ═══ Packet Capture ══════════════════════════════════════════
let packets = [];
const MAX_PKT = 2000;
let filterText = '';

document.getElementById('cap-filter').addEventListener('input', e => {
  filterText = e.target.value.toLowerCase().trim();
  rebuildPktTable();
});

function matchFilter(p) {
  if (!filterText) return true;
  const f = filterText;
  if (f==='ul') return p.uplink;
  if (f==='dl') return !p.uplink;
  const am = f.match(/^arfcn\s*=?\s*(\d+)$/);
  if (am) return String(p.arfcn)===am[1];
  return `${p.protocol} ${p.info} ${p.arfcn} ${p.channel}`.toLowerCase().includes(f);
}

function addPacket(p) {
  packets.push(p);
  if (packets.length > MAX_PKT) packets = packets.slice(-MAX_PKT/2);
  document.getElementById('pkt-counter').textContent = packets.length+' packets';
  setTsharkTag(true);
  if (!matchFilter(p)) return;
  const tbody = document.getElementById('pkt-tbody');
  tbody.appendChild(makePktRow(p));
  while (tbody.children.length > 600) tbody.removeChild(tbody.firstChild);
  const wrap = document.getElementById('pkt-list-wrap');
  if (wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight < 50) wrap.scrollTop = wrap.scrollHeight;
}

function makePktRow(p) {
  const tr = document.createElement('tr');
  tr.className = 'flash'; tr.dataset.pid = p.id;
  tr.onclick = () => { document.querySelectorAll('.pkt-table tr.selected').forEach(r=>r.classList.remove('selected')); tr.classList.add('selected'); renderDetail(p); };
  const ts = typeof p.ts==='number' ? new Date(p.ts*1000).toLocaleTimeString('en-GB',{hour12:false})+'.'+String(Math.floor((p.ts%1)*1000)).padStart(3,'0') : '—';
  const pc = (p.protocol||'').toLowerCase();
  const cls = pc.includes('rr')?'proto-rr':pc.includes('mm')?'proto-mm':pc.includes('cc')?'proto-cc':pc.includes('sms')?'proto-sms':pc.includes('dtap')?'proto-dtap':'proto-def';
  tr.innerHTML = `<td style="color:var(--t3)">${p.id}</td><td style="color:var(--t2)">${ts}</td><td><span class="${p.uplink?'dir-ul':'dir-dl'}">${p.uplink?'UL':'DL'}</span></td><td style="color:var(--cyan)">${p.arfcn||'—'}</td><td style="color:var(--t3)">${p.timeslot||'—'}</td><td style="color:var(--t3)">${p.fn||'—'}</td><td><span class="proto ${cls}">${p.protocol||'—'}</span></td><td style="color:var(--t1);max-width:350px;overflow:hidden;text-overflow:ellipsis">${esc(p.info||'')}</td>`;
  return tr;
}

function renderDetail(p) {
  const el = document.getElementById('pkt-detail');
  document.getElementById('detail-badge').textContent = '#'+p.id+' '+p.protocol;
  if (!p.layers) { el.innerHTML = '<span style="color:var(--t3)">No decode</span>'; return; }
  let h = '';
  for (const [ln, fields] of Object.entries(p.layers)) {
    if (ln.endsWith('_raw')) continue;
    h += `<div class="layer-group"><div class="layer-name" onclick="togLayer(this)"><span class="arrow">▶</span> ${esc(ln)}</div><div class="layer-fields">`;
    if (typeof fields==='object'&&fields) {
      for (const [k,v] of Object.entries(fields)) {
        if (k.endsWith('_raw')||k.endsWith('_tree')) continue;
        const val = Array.isArray(v)?v.join(', '):String(v);
        const sk = k.replace(ln+'_','').replace(ln.replace('.','_')+'_','');
        h += `<div class="field-row"><span class="field-key">${esc(sk)}</span>:<span class="field-val">${esc(val)}</span></div>`;
      }
    }
    h += '</div></div>';
  }
  el.innerHTML = h;
}

function togLayer(el) { const f=el.nextElementSibling; const o=f.classList.toggle('open'); el.querySelector('.arrow').classList.toggle('open',o); }

function clearPackets() {
  packets=[]; document.getElementById('pkt-tbody').innerHTML='';
  document.getElementById('pkt-counter').textContent='0 packets';
  document.getElementById('pkt-detail').innerHTML='<span style="color:var(--t3)">Click a packet to inspect layers</span>';
  document.getElementById('detail-badge').textContent='—';
}

function rebuildPktTable() {
  const tbody = document.getElementById('pkt-tbody');
  tbody.innerHTML='';
  packets.filter(matchFilter).slice(-600).forEach(p=>tbody.appendChild(makePktRow(p)));
}

// ═══ VTY Consoles (0 and 1) ══════════════════════════════════
const vty = [{key:null,buffer:'',history:[],histIdx:-1}, {key:null,buffer:'',history:[],histIdx:-1}];

function vtyConnect(idx) {
  const opId = document.querySelectorAll('.vty-op')[idx].value;
  const comp = document.querySelectorAll('.vty-comp')[idx].value;
  if (!opId) return;
  const key = `${opId}-${comp}`;
  vty[idx].key = key;
  vty[idx].buffer = '';
  send({ type:'vty_connect', opId:parseInt(opId), component:comp });
}

function vtyOnConnected(d) {
  const idx = vty.findIndex(v=>v.key===d.key);
  if (idx<0) {
    const free = vty.findIndex(v=>!v.key);
    if (free>=0) { vty[free].key=d.key; vty[free].buffer=''; showVty(free, d); }
  } else {
    showVty(idx, d);
  }
}

function showVty(idx, d) {
  vty[idx].buffer += `\x1b[sys]Connected to op${d.opId}/${d.component}:${d.port}\x1b[/]\r\n`;
  document.getElementById('vty-empty-'+idx).style.display='none';
  document.getElementById('vty-screen-'+idx).style.display='block';
  document.getElementById('vty-prm-'+idx).textContent = `op${d.opId}/${d.component}> `;
  renderVty(idx);
}

function vtyOnData(d) {
  const idx = vty.findIndex(v=>v.key===d.key);
  if (idx<0) return;
  vty[idx].buffer += d.data;
  if (vty[idx].buffer.length > 120000) vty[idx].buffer = vty[idx].buffer.slice(-80000);
  renderVty(idx);
}

function vtyOnError(d) {
  const idx = vty.findIndex(v=>v.key===d.key);
  if (idx>=0) { vty[idx].buffer += `\x1b[err]ERROR: ${d.msg}\x1b[/]\r\n`; renderVty(idx); }
}

function vtyOnDisc(d) {
  const idx = vty.findIndex(v=>v.key===d.key);
  if (idx>=0) {
    vty[idx].buffer += '\r\n--- disconnected ---\r\n';
    renderVty(idx);
    vty[idx].key = null;
    document.getElementById('vty-prm-'+idx).textContent = '$ ';
  }
}

function renderVty(idx) {
  const screen = document.getElementById('vty-screen-'+idx);
  const raw = vty[idx].buffer;
  screen.innerHTML = raw
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\x1b\[sys\](.*?)\x1b\[\/\]/gs, '<span class="sys">$1</span>')
    .replace(/\x1b\[err\](.*?)\x1b\[\/\]/gs, '<span class="err">$1</span>')
    .replace(/\x1b\[cmd\](.*?)\x1b\[\/\]/gs, '<span class="cmd">$1</span>');
  screen.scrollTop = screen.scrollHeight;
}

function vtyKey(e, idx) {
  const input = e.target;
  const v = vty[idx];
  if (e.key==='Enter') {
    const cmd = input.value;
    if (!v.key) return;
    v.buffer += `\x1b[cmd]${cmd}\x1b[/]\r\n`;
    v.history.push(cmd); v.histIdx = v.history.length;
    send({ type:'vty_exec', key:v.key, cmd });
    input.value = '';
    renderVty(idx);
  } else if (e.key==='ArrowUp') {
    e.preventDefault();
    if (v.histIdx>0) { v.histIdx--; input.value=v.history[v.histIdx]||''; }
  } else if (e.key==='ArrowDown') {
    e.preventDefault();
    if (v.histIdx<v.history.length-1) { v.histIdx++; input.value=v.history[v.histIdx]||''; }
    else { v.histIdx=v.history.length; input.value=''; }
  } else if (e.key==='Tab') {
    e.preventDefault();
    if (v.key) send({ type:'vty_exec', key:v.key, cmd:input.value+'?' });
  }
}

function vtyClose(idx) {
  if (vty[idx].key) {
    send({ type:'vty_disconnect', key:vty[idx].key });
    vty[idx].key = null;
    vty[idx].buffer = '';
    document.getElementById('vty-screen-'+idx).style.display='none';
    document.getElementById('vty-screen-'+idx).innerHTML='';
    document.getElementById('vty-empty-'+idx).style.display='flex';
    document.getElementById('vty-prm-'+idx).textContent='$ ';
  }
}

// ═══ Helpers ═════════════════════════════════════════════════
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ═══ Init VTY screens hidden ═════════════════════════════════
document.getElementById('vty-screen-0').style.display='none';
document.getElementById('vty-screen-1').style.display='none';

// ═══ Boot ════════════════════════════════════════════════════
connectWs();
</script>
</body>
</html>
