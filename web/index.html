<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>osmo_egprs — Operations Console</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  /* ═══ Theme variables ═══ */
  [data-theme="dark"] {
    --bg-0: #0b0e14; --bg-1: #10141c; --bg-2: #161c28; --bg-3: #1e2636;
    --bg-4: #283040; --bg-5: #323e52;
    --border: #1e2a3a; --border-b: #2e3e54;
    --t0: #ecf0f6; --t1: #b0bcd0; --t2: #728aa8; --t3: #485a74;
    --green: #22d67a; --red: #f05555; --amber: #f0a820;
    --cyan: #28c8e0; --blue: #4888ff; --purple: #a070ff; --pink: #f060a0;
    --term-bg: #080a0f; --term-text: #c8d4e0;
    --glow-g: 0 0 6px rgba(34,214,122,0.25);
    --glow-r: 0 0 6px rgba(240,85,85,0.25);
    --shadow: 0 2px 12px rgba(0,0,0,0.5);
    --logo-filter: none;
  }
  [data-theme="light"] {
    --bg-0: #f4f5f8; --bg-1: #ffffff; --bg-2: #eaecf1; --bg-3: #dde0e8;
    --bg-4: #cfd3dc; --bg-5: #bec4d0;
    --border: #d0d4dc; --border-b: #c0c6d0;
    --t0: #1a1e28; --t1: #3a4050; --t2: #6a7488; --t3: #98a0b0;
    --green: #18a85c; --red: #d03030; --amber: #c08010;
    --cyan: #1098b0; --blue: #3060d0; --purple: #7050c0; --pink: #c04080;
    --term-bg: #1a1e28; --term-text: #c8d4e0;
    --glow-g: 0 0 4px rgba(24,168,92,0.2);
    --glow-r: 0 0 4px rgba(208,48,48,0.2);
    --shadow: 0 2px 8px rgba(0,0,0,0.12);
    --logo-filter: brightness(0.7);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html, body {
    height:100%; background:var(--bg-0); color:var(--t0);
    font-family:'IBM Plex Sans','JetBrains Mono',system-ui,sans-serif;
    font-size:14px; overflow:hidden;
  }

  code, .mono, .vty-screen, .vty-input, .pkt-table, #cap-filter {
    font-family:'JetBrains Mono',monospace;
  }

  /* ═══ Layout de base ═══ */
  #app {
    display: grid;
    grid-template-rows: 44px 1fr;
    grid-template-columns: 280px 1fr;
    height: 100vh;
  }

  /* ═══ Header responsive ═══ */
  header {
    grid-column: 1 / -1;
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 18px; gap: 14px;
    flex-wrap: wrap;
  }
  
  .logo { 
    font-family:'JetBrains Mono',monospace; 
    font-weight:700; 
    font-size:15px; 
    color:var(--green); 
    letter-spacing:.04em; 
    filter:var(--logo-filter);
    white-space: nowrap;
  }
  
  .sep { 
    width:1px; 
    height:20px; 
    background:var(--border-b); 
  }
  
  .htag { 
    font-size:12px; 
    padding:3px 10px; 
    border-radius:4px; 
    background:var(--bg-3); 
    color:var(--t2);
    white-space: nowrap;
  }
  
  .htag.on { 
    background:rgba(34,214,122,0.1); 
    color:var(--green); 
  }
  
  .hright { 
    margin-left:auto; 
    display:flex; 
    align-items:center; 
    gap:10px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .btn {
    background:var(--bg-3); border:1px solid var(--border-b); color:var(--t1);
    font-family:'IBM Plex Sans',sans-serif; font-size:12px; font-weight:500;
    padding:5px 14px; cursor:pointer; border-radius:4px; transition:all .12s;
    white-space: nowrap;
  }
  
  .btn:hover { background:var(--bg-4); color:var(--t0); }
  .btn.primary { border-color:rgba(34,214,122,0.3); }
  .btn.primary:hover { background:rgba(34,214,122,0.12); color:var(--green); }
  .btn.danger:hover { background:rgba(240,85,85,0.12); color:var(--red); }

  .theme-btn {
    background:var(--bg-3); border:1px solid var(--border-b); color:var(--t2);
    width:34px; height:34px; border-radius:50%; cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:16px;
    transition:all .2s;
  }
  .theme-btn:hover { background:var(--bg-4); color:var(--t0); }

  .dot { 
    display:inline-block; 
    width:8px; 
    height:8px; 
    border-radius:50%; 
    vertical-align:middle; 
    margin-right:6px; 
  }
  
  .dot.on { 
    background:var(--green); 
    box-shadow:var(--glow-g); 
  }
  
  .dot.off { 
    background:var(--red); 
    box-shadow:var(--glow-r); 
  }

  /* ═══ Panels ═══ */
  .panel { 
    background:var(--bg-1); 
    display:flex; 
    flex-direction:column; 
    overflow:hidden; 
  }
  
  .ph { 
    display:flex; 
    align-items:center; 
    padding:8px 14px; 
    background:var(--bg-2); 
    border-bottom:1px solid var(--border); 
    gap:8px; 
    flex-shrink:0; 
  }
  
  .ph h2 { 
    font-size:12px; 
    font-weight:600; 
    letter-spacing:.06em; 
    text-transform:uppercase; 
    color:var(--t2); 
  }
  
  .ph .badge { 
    font-size:11px; 
    padding:2px 8px; 
    border-radius:10px; 
    background:var(--bg-4); 
    color:var(--t2); 
    margin-left:auto; 
  }
  
  .ph .badge.live { 
    background:rgba(34,214,122,0.1); 
    color:var(--green); 
  }

  .pb { 
    flex:1; 
    overflow-y:auto; 
    padding:8px; 
  }
  
  .pb::-webkit-scrollbar { width:6px; }
  .pb::-webkit-scrollbar-track { background:var(--bg-1); }
  .pb::-webkit-scrollbar-thumb { background:var(--bg-4); border-radius:3px; }

  /* ═══ Left: Operators ═══ */
  #op-panel { 
    grid-row:2 / -1; 
    grid-column:1; 
    border-right:1px solid var(--border); 
  }

  .op-card { 
    margin:4px 0; 
    background:var(--bg-2); 
    border:1px solid var(--border); 
    border-radius:5px; 
    overflow:hidden; 
  }
  
  .op-card.on { 
    border-left:3px solid var(--green); 
  }
  
  .op-card.off { 
    border-left:3px solid var(--t3); 
    opacity:.45; 
  }
  
  .op-head { 
    padding:10px 12px; 
    cursor:pointer; 
    display:flex; 
    align-items:center; 
    gap:8px; 
  }
  
  .op-head .id { 
    font-family:'JetBrains Mono',monospace; 
    font-weight:700; 
    color:var(--cyan); 
    font-size:14px; 
  }
  
  .op-head .ms { 
    font-size:12px; 
    color:var(--t2); 
    margin-left:auto; 
  }
  
  .op-detail { 
    display:none; 
    padding:6px 12px 10px; 
    font-size:12px; 
    color:var(--t2); 
    border-top:1px solid var(--border); 
  }
  
  .op-card.expanded .op-detail { 
    display:block; 
  }
  
  .op-row { 
    display:flex; 
    justify-content:space-between; 
    padding:3px 0; 
  }
  
  .op-row .v { 
    color:var(--t1); 
    font-family:'JetBrains Mono',monospace; 
    font-size:12px; 
  }
  
  .ms-chip { 
    display:inline-block; 
    font-family:'JetBrains Mono',monospace; 
    font-size:11px; 
    padding:2px 6px; 
    margin:2px; 
    border-radius:3px; 
    background:var(--bg-4); 
    color:var(--amber); 
  }

  /* ═══ Capture area (nouvelle table) ═══ */
  #capture-area { 
    grid-row:2 / -1; 
    grid-column:2; 
    display:flex; 
    flex-direction:column; 
    overflow:hidden; 
    border-bottom:1px solid var(--border); 
  }
  
  #cap-toolbar { 
    display:flex; 
    align-items:center; 
    padding:6px 10px; 
    gap:8px; 
    background:var(--bg-2); 
    border-bottom:1px solid var(--border); 
    flex-shrink:0; 
    flex-wrap: wrap;
  }
  
  #cap-filter {
    flex: 1 1 200px;
    background:var(--bg-3); 
    border:1px solid var(--border-b); 
    color:var(--t0);
    font-size:13px; 
    padding:5px 10px; 
    outline:none; 
    border-radius:4px;
    min-width: 150px;
  }
  
  #cap-filter:focus { 
    border-color:var(--cyan); 
  }
  
  #cap-filter::placeholder { 
    color:var(--t3); 
  }

  #pkt-list-wrap { 
    flex:1; 
    overflow-y:auto; 
    min-height:0; 
  }
  
  .pkt-table { 
    width:100%; 
    border-collapse:collapse; 
    font-size:12px; 
  }
  
  .pkt-table thead { 
    position:sticky; 
    top:0; 
    z-index:1; 
  }
  
  .pkt-table th {
    background:var(--bg-2); 
    color:var(--t3); 
    font-weight:600; 
    text-align:left;
    padding:5px 8px; 
    font-size:10px; 
    letter-spacing:.06em; 
    text-transform:uppercase;
    border-bottom:1px solid var(--border);
  }
  
  .pkt-table td { 
    padding:4px 8px; 
    border-bottom:1px solid var(--bg-2); 
    white-space:nowrap; 
    overflow:hidden; 
    text-overflow:ellipsis; 
    cursor:pointer; 
  }
  
  .pkt-table tr:hover { 
    background:var(--bg-3); 
  }
  
  .pkt-table tr.selected { 
    background:rgba(40,200,224,0.07); 
  }
  
  .pkt-table tr.flash { 
    animation: pktFlash .4s; 
  }
  
  @keyframes pktFlash { 
    0%{background:rgba(34,214,122,0.08)} 
    100%{background:transparent} 
  }

  .proto { 
    display:inline-block; 
    padding:1px 6px; 
    border-radius:3px; 
    font-size:11px; 
    font-weight:500; 
  }
  
  .proto-def  { background:var(--bg-4); color:var(--t1); }

  /* Packet detail panel */
  #pkt-detail-wrap {
    height:180px; 
    min-height:60px; 
    max-height:50%;
    border-top:2px solid var(--border-b); 
    background:var(--bg-1);
    overflow-y:auto; 
    flex-shrink:0; 
    resize:vertical;
  }
  
  #pkt-detail-wrap .ph { 
    position:sticky; 
    top:0; 
    z-index:1; 
  }
  
  #pkt-detail { 
    padding:6px 10px; 
    font-family:'JetBrains Mono',monospace; 
    font-size:12px; 
    line-height:1.7; 
    white-space: pre-wrap;
  }

  /* ═══ Popups VTY flottantes ═══ */
  #vty-popup-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1000;
  }
  
  .vty-popup {
    position: absolute;
    width: 600px;
    height: 400px;
    min-width: 300px;
    min-height: 250px;
    background: var(--bg-1);
    border: 1px solid var(--border-b);
    border-radius: 6px;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    pointer-events: auto;
    resize: both;
    transition: box-shadow 0.1s;
  }
  
  .vty-popup.dragging {
    opacity: 0.95;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    transition: none;
  }
  
  .vty-popup .vty-header {
    background: var(--bg-2);
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: move;
    user-select: none;
    flex-shrink: 0;
  }
  
  .vty-popup .vty-header .label {
    font-size: 12px;
    font-weight: 600;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  
  .vty-popup .vty-header .spacer {
    flex: 1;
  }
  
  .vty-popup .vty-header .close-btn {
    background: transparent;
    border: none;
    color: var(--t2);
    font-size: 18px;
    cursor: pointer;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
  }
  
  .vty-popup .vty-header .close-btn:hover {
    background: var(--bg-4);
    color: var(--red);
  }
  
  .vty-popup .vty-toolbar {
    display: flex;
    align-items: center;
    padding: 6px 10px;
    gap: 6px;
    background: var(--bg-2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  
  .vty-popup .vty-toolbar select {
    background: var(--bg-3);
    border: 1px solid var(--border-b);
    color: var(--t0);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 4px 6px;
    outline: none;
    border-radius: 3px;
    min-width: 70px;
  }
  
  .vty-popup .vty-screen {
    flex: 1;
    overflow-y: auto;
    padding: 8px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.6;
    background: var(--term-bg);
    color: var(--term-text);
    white-space: pre-wrap;
    word-break: break-all;
  }
  
  .vty-popup .vty-screen .prompt { color: var(--green); }
  .vty-popup .vty-screen .err { color: var(--red); }
  .vty-popup .vty-screen .sys { color: var(--cyan); font-style: italic; }
  .vty-popup .vty-screen .cmd { color: var(--amber); }
  
  .vty-popup .vty-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--t3);
    font-size: 13px;
    text-align: center;
    padding: 20px;
    background: var(--term-bg);
  }
  
  .vty-popup .vty-input-row {
    display: flex;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg-2);
  }
  
  .vty-popup .vty-input-row .prm {
    padding: 7px 10px;
    color: var(--green);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: 13px;
    white-space: nowrap;
  }
  
  .vty-popup .vty-input-row input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--t0);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 7px 0;
    outline: none;
    min-width: 50px;
  }

  /* ═══ Media queries (simplifiées) ═══ */
  @media screen and (max-width: 1024px) {
    #app { grid-template-columns: 220px 1fr; }
  }
  @media screen and (max-width: 768px) {
    #app { grid-template-rows: auto 1fr; grid-template-columns: 1fr; }
    #op-panel { grid-row: 2; max-height: 30vh; }
    #capture-area { grid-row: 3; }
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <span class="logo">⎔ OSMO_EGPRS</span>
    <span class="sep"></span>
    <span class="htag" id="tag-ops">0 ops</span>
    <span class="htag" id="tag-tshark">tshark off</span>
<!-- Dans l'en-tête, remplacer la partie des boutons -->
    <div class="hright">
      <button class="btn" onclick="send({type:'poll'})">⟳ Poll</button>
      <button class="btn" onclick="clearPackets()">Clear</button>
      <button class="btn" onclick="newVtyPopup()">➕ VTY</button>
      <span class="sep"></span>
      <button class="theme-btn" onclick="toggleTheme()" id="theme-toggle" title="Toggle theme">◐</button>
      <span style="font-size:12px;color:var(--t3)"><span class="dot off" id="ws-dot"></span><span id="ws-txt">—</span></span>
    </div>

    <!-- Et dans le tag, on peut mettre un indicateur de réception UDP -->
    <span class="htag" id="tag-udp">UDP listen</span>
  </header>

  <!-- Left: Operators -->
  <div class="panel" id="op-panel">
    <div class="ph"><h2>Operators</h2><span class="badge" id="op-count">0</span></div>
    <div class="pb" id="op-list"></div>
  </div>

  <!-- Capture area -->
  <div id="capture-area">
    <div id="cap-toolbar">
      <input type="text" id="cap-filter" placeholder="Filter text…" spellcheck="false">
      <span style="font-size:12px;color:var(--t3);white-space:nowrap" id="pkt-counter">0 packets</span>
    </div>
    <div id="pkt-list-wrap">
      <table class="pkt-table">
        <thead><tr>
          <th style="width:50px">#</th>
          <th style="width:100px">TIME</th>
          <th style="width:150px">SRC → DST</th>
          <th style="width:70px">PROT</th>
          <th style="width:50px">LEN</th>
          <th>INFO</th>
        </tr></thead>
        <tbody id="pkt-tbody"></tbody>
      </table>
    </div>
    <div id="pkt-detail-wrap">
      <div class="ph"><h2>Packet Detail</h2><span class="badge" id="detail-badge">—</span></div>
      <div id="pkt-detail"><span style="color:var(--t3)">Click a packet to inspect</span></div>
    </div>
  </div>

</div>

<!-- Conteneur pour les popups VTY -->
<div id="vty-popup-container"></div>

<script>
// ═══ Thème ═══════════════════════════════════════════════════
function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('theme-toggle').textContent = next === 'dark' ? '◐' : '◑';
  try { localStorage.setItem('osmo-theme', next); } catch {}
}
try {
  const saved = localStorage.getItem('osmo-theme');
  if (saved) { document.documentElement.dataset.theme = saved; document.getElementById('theme-toggle').textContent = saved === 'dark' ? '◐' : '◑'; }
} catch {}

// ═══ WebSocket ═══════════════════════════════════════════════
const WS_URL = `ws://${location.hostname}:${location.port||80}`;
let ws = null;
let opState = {}, activeOpIds = [];

function connectWs() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => setWs(true);
  ws.onmessage = e => handle(JSON.parse(e.data));
  ws.onclose = () => { setWs(false); setTimeout(connectWs, 2000); };
  ws.onerror = () => {};
}
function setWs(on) {
  document.getElementById('ws-dot').className = 'dot '+(on?'on':'off');
  document.getElementById('ws-txt').textContent = on?'LIVE':'—';
}
function send(msg) { if (ws && ws.readyState===1) ws.send(JSON.stringify(msg)); }

// ═══ Message Router avec routage vers les popups ═════════════
const popups = {}; // popupId -> { win, key, pending }

function handle(msg) {
  switch(msg.type) {
    case 'init':
      activeOpIds = msg.data.activeOpIds||[];
      updateOps(msg.data.operators);
      setTsharkTag(msg.data.tsharkActive || false);
      broadcastToPopups('init_popup', { ops: activeOpIds.length ? activeOpIds : Object.keys(opState).map(Number) });
      break;
    case 'state':
      activeOpIds = msg.data.activeOpIds||activeOpIds;
      updateOps(msg.data.operators);
      broadcastToPopups('init_popup', { ops: activeOpIds.length ? activeOpIds : Object.keys(opState).map(Number) });
      break;
    case 'tshark_status':
      setTsharkTag(msg.data.active);
      break;
    case 'packet': 
      addPacket(msg.data); 
      break;
    case 'tshark_stopped': 
      setTsharkTag(false); 
      break;
    case 'tshark_error':
      setTsharkTag(false);
      document.getElementById('tag-tshark').textContent = 'tshark ERROR';
      break;
    case 'vty_connected': routeToPopup('vty_connected', msg.data); break;
    case 'vty_data':      routeToPopup('vty_data', msg.data); break;
    case 'vty_error':     routeToPopup('vty_error', msg.data); break;
    case 'vty_disconnected': routeToPopup('vty_disconnected', msg.data); break;
  }
}

function routeToPopup(type, data) {
  for (const [popupId, pop] of Object.entries(popups)) {
    if (pop.key === data.key) {
      if (pop.win && !pop.win.closed) {
        pop.win.postMessage({ type, popupId, ...data }, '*');
      } else {
        delete popups[popupId];
      }
      return;
    }
  }
  if (type === 'vty_connected') {
    for (const [popupId, pop] of Object.entries(popups)) {
      if (pop.pending && pop.pending.opId === data.opId && pop.pending.component === data.component && !pop.key) {
        pop.key = data.key;
        delete pop.pending;
        if (pop.win && !pop.win.closed) {
          pop.win.postMessage({ type, popupId, ...data }, '*');
        }
        return;
      }
    }
  }
}

function broadcastToPopups(type, data) {
  for (const [popupId, pop] of Object.entries(popups)) {
    if (pop.win && !pop.win.closed) {
      pop.win.postMessage({ type, popupId, ...data }, '*');
    } else {
      delete popups[popupId];
    }
  }
}

function setTsharkTag(on) {
  const el = document.getElementById('tag-tshark');
  el.textContent = on ? 'tshark ●' : 'tshark off';
  el.className = 'htag' + (on?' on':'');
}

// ═══ Operators ═══════════════════════════════════════════════
function updateOps(ops) {
  opState = ops||{};
  const el = document.getElementById('op-list');
  const ids = Object.keys(opState).map(Number).sort((a,b)=>a-b);
  document.getElementById('op-count').textContent = ids.length;
  document.getElementById('tag-ops').textContent = ids.length+' ops';
  document.getElementById('tag-ops').className = 'htag'+(ids.length?' on':'');

  el.innerHTML = ids.map(id => {
    const op = opState[id], bts = op.components?.bts||{}, mc = op.mobiles?.length||0;
    return `<div class="op-card on" onclick="this.classList.toggle('expanded')">
      <div class="op-head">
        <span class="id">OP${id}</span>
        <span style="font-size:12px;color:var(--t2)">${bts.arfcn!=null?'ARFCN '+bts.arfcn:''}</span>
        <span class="ms">${mc} MS</span>
      </div>
      <div class="op-detail">
        <div class="op-row"><span>BSIC</span><span class="v">${bts.bsic??'—'}</span></div>
        <div class="op-row"><span>LAC</span><span class="v">${bts.lac??'—'}</span></div>
        <div class="op-row"><span>CI</span><span class="v">${bts.ci??'—'}</span></div>
        <div class="op-row"><span>BTS Type</span><span class="v">${bts.type||'—'} ${bts.band||''}</span></div>
        <div class="op-row"><span>TRX</span><span class="v">${bts.trx_count||'—'}</span></div>
        ${mc>0?'<div style="margin-top:6px">'+op.mobiles.map(m=>`<span class="ms-chip">${m.imsi.slice(0,5)}…${m.imsi.slice(12)}</span>`).join('')+'</div>':''}
      </div>
    </div>`;
  }).join('');
}

// ═══ Packet Capture (nouveau format) ═════════════════════════
let packets = [];
const MAX_PKT = 2000;
let filterText = '';

document.getElementById('cap-filter').addEventListener('input', e => {
  filterText = e.target.value.toLowerCase().trim();
  rebuildPktTable();
});

function matchFilter(p) {
  if (!filterText) return true;
  const f = filterText;
  return `${p.src} ${p.dst} ${p.protocol} ${p.info}`.toLowerCase().includes(f);
}

function addPacket(p) {
  packets.push(p);
  if (packets.length > MAX_PKT) packets = packets.slice(-MAX_PKT/2);
  document.getElementById('pkt-counter').textContent = packets.length+' packets';
  setTsharkTag(true);
  if (!matchFilter(p)) return;
  const tbody = document.getElementById('pkt-tbody');
  tbody.appendChild(makePktRow(p));
  while (tbody.children.length > 600) tbody.removeChild(tbody.firstChild);
  const wrap = document.getElementById('pkt-list-wrap');
  if (wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight < 50) wrap.scrollTop = wrap.scrollHeight;
}

function makePktRow(p) {
  const tr = document.createElement('tr');
  tr.className = 'flash'; tr.dataset.pid = p.id;
  tr.onclick = () => { 
    document.querySelectorAll('.pkt-table tr.selected').forEach(r => r.classList.remove('selected')); 
    tr.classList.add('selected'); 
    renderDetail(p); 
  };
  const ts = typeof p.ts === 'number' 
    ? new Date(p.ts * 1000).toLocaleTimeString('en-GB', { hour12: false }) + '.' + String(Math.floor((p.ts % 1) * 1000)).padStart(3, '0') 
    : '—';
  
  tr.innerHTML = `<td style="color:var(--t3)">${p.id}</td>
    <td style="color:var(--t2)">${ts}</td>
    <td style="color:var(--cyan)">${p.src || '—'} → ${p.dst || '—'}</td>
    <td><span class="proto proto-def">${p.protocol || '—'}</span></td>
    <td style="color:var(--t2)">${p.length || '—'}</td>
    <td style="color:var(--t1); max-width:350px; overflow:hidden; text-overflow:ellipsis">${esc(p.info || '')}</td>`;
  return tr;
}

function renderDetail(p) {
  const el = document.getElementById('pkt-detail');
  document.getElementById('detail-badge').textContent = '#'+p.id+' '+p.protocol;
  el.innerHTML = `<pre>${esc(JSON.stringify(p, null, 2))}</pre>`;
}

function clearPackets() {
  packets=[]; document.getElementById('pkt-tbody').innerHTML='';
  document.getElementById('pkt-counter').textContent='0 packets';
  document.getElementById('pkt-detail').innerHTML='<span style="color:var(--t3)">Click a packet to inspect</span>';
  document.getElementById('detail-badge').textContent='—';
}

function rebuildPktTable() {
  const tbody = document.getElementById('pkt-tbody');
  tbody.innerHTML='';
  packets.filter(matchFilter).slice(-600).forEach(p=>tbody.appendChild(makePktRow(p)));
}

// ═══ Gestion des popups VTY détachées ════════════════════════
function newVtyPopup() {
  const popupId = 'popup_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
  const popup = window.open('about:blank', '_blank', 'width=700,height=500,resizable=yes,scrollbars=yes');
  if (!popup) {
    alert('Le navigateur a bloqué l\'ouverture de la popup. Autorisez les popups pour ce site.');
    return;
  }

  const doc = popup.document;
  doc.write(`
    <!DOCTYPE html>
    <html data-theme="${document.documentElement.dataset.theme}">
    <head>
      <meta charset="UTF-8">
      <title>VTY Console</title>
      <style>
        body { margin:0; padding:0; font-family:'JetBrains Mono',monospace; background:#10141c; color:#ecf0f6; display:flex; flex-direction:column; height:100vh; }
        .toolbar { background:#161c28; padding:6px 10px; border-bottom:1px solid #1e2a3a; display:flex; gap:6px; flex-wrap:wrap; }
        select, button { background:#1e2636; border:1px solid #2e3e54; color:#b0bcd0; padding:4px 8px; border-radius:3px; font-family:inherit; }
        button.primary { border-color:rgba(34,214,122,0.3); }
        .screen { flex:1; overflow-y:auto; padding:8px 10px; background:#080a0f; color:#c8d4e0; white-space:pre-wrap; font-size:13px; line-height:1.6; }
        .input-row { display:flex; border-top:1px solid #1e2a3a; background:#161c28; }
        .prompt { padding:7px 10px; color:#22d67a; font-weight:600; white-space:nowrap; }
        input { flex:1; background:transparent; border:none; color:#ecf0f6; padding:7px 0; outline:none; font-family:inherit; }
        .empty { display:flex; align-items:center; justify-content:center; flex:1; color:#728aa8; }
        .sys { color:#28c8e0; font-style:italic; }
        .err { color:#f05555; }
        .cmd { color:#f0a820; }
      </style>
    </head>
    <body>
      <div class="toolbar">
        <select class="op-select"><option value="">OP…</option></select>
        <select class="comp-select">
          <option value="bsc">BSC</option><option value="msc">MSC</option><option value="hlr">HLR</option>
          <option value="bts">BTS</option><option value="mgw">MGW</option><option value="stp">STP</option>
          <option value="sgsn">SGSN</option><option value="ggsn">GGSN</option><option value="pcu">PCU</option>
          <option value="baseband">Baseband</option>
        </select>
        <button class="primary" onclick="connect()">Connect</button>
        <button onclick="closePopup()">Close</button>
      </div>
      <div class="screen" id="screen" style="display:none;"></div>
      <div class="empty" id="empty">Select operator + component → Connect</div>
      <div class="input-row" style="display:none;" id="inputRow">
        <span class="prompt" id="prompt">$</span>
        <input type="text" id="cmdInput" placeholder="VTY command…" onkeydown="handleKey(event)">
      </div>
      <script>
        const popupId = ${JSON.stringify(popupId)};
        let key = null;
        let buffer = '';
        let history = [];
        let histIdx = -1;
        
        window.opener.postMessage({ type: 'popup_ready', popupId }, '*');
        
        window.addEventListener('message', (e) => {
          const msg = e.data;
          if (msg.type === 'init_popup' && msg.popupId === popupId) {
            const opSelect = document.querySelector('.op-select');
            opSelect.innerHTML = '<option value="">OP…</option>' + msg.ops.map(id => '<option value="'+id+'">OP'+id+'</option>').join('');
          } else if (msg.type === 'vty_connected' && msg.popupId === popupId) {
            key = msg.key;
            document.getElementById('empty').style.display = 'none';
            document.getElementById('screen').style.display = 'block';
            document.getElementById('inputRow').style.display = 'flex';
            document.getElementById('prompt').textContent = 'op'+msg.opId+'/'+msg.component+'> ';
            buffer += '\\x1b[sys]Connected to op'+msg.opId+'/'+msg.component+':'+msg.port+'\\x1b[/]\\r\\n';
            render();
          } else if (msg.type === 'vty_data' && msg.popupId === popupId) {
            buffer += msg.data;
            if (buffer.length > 120000) buffer = buffer.slice(-80000);
            render();
          } else if (msg.type === 'vty_error' && msg.popupId === popupId) {
            buffer += '\\x1b[err]ERROR: ' + msg.msg + '\\x1b[/]\\r\\n';
            render();
          } else if (msg.type === 'vty_disconnected' && msg.popupId === popupId) {
            buffer += '\\r\\n--- disconnected ---\\r\\n';
            render();
            key = null;
            document.getElementById('prompt').textContent = '$ ';
            document.getElementById('empty').style.display = 'flex';
            document.getElementById('screen').style.display = 'none';
            document.getElementById('inputRow').style.display = 'none';
          }
        });
        
        function connect() {
          const opId = document.querySelector('.op-select').value;
          const component = document.querySelector('.comp-select').value;
          if (!opId) return;
          window.opener.postMessage({ type: 'vty_connect', popupId, opId: parseInt(opId), component }, '*');
        }
        
        function closePopup() {
          if (key) {
            window.opener.postMessage({ type: 'vty_disconnect', popupId, key }, '*');
          }
          window.close();
        }
        
        function handleKey(e) {
          const input = document.getElementById('cmdInput');
          if (e.key === 'Enter') {
            const cmd = input.value;
            if (!key) return;
            buffer += '\\x1b[cmd]' + cmd + '\\x1b[/]\\r\\n';
            history.push(cmd);
            histIdx = history.length;
            window.opener.postMessage({ type: 'vty_exec', popupId, key, cmd }, '*');
            input.value = '';
            render();
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (histIdx > 0) {
              histIdx--;
              input.value = history[histIdx] || '';
            }
          } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (histIdx < history.length - 1) {
              histIdx++;
              input.value = history[histIdx] || '';
            } else {
              histIdx = history.length;
              input.value = '';
            }
          } else if (e.key === 'Tab') {
            e.preventDefault();
            if (key) {
              window.opener.postMessage({ type: 'vty_exec', popupId, key, cmd: input.value + '?' }, '*');
            }
          }
        }
        
        function render() {
          const screen = document.getElementById('screen');
          let html = buffer
            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/\\x1b\[sys\](.*?)\\x1b\[\/\]/gs, '<span class="sys">$1</span>')
            .replace(/\\x1b\[err\](.*?)\\x1b\[\/\]/gs, '<span class="err">$1</span>')
            .replace(/\\x1b\[cmd\](.*?)\\x1b\[\/\]/gs, '<span class="cmd">$1</span>');
          screen.innerHTML = html;
          screen.scrollTop = screen.scrollHeight;
        }
      <\/script>
    </body>
    </html>
  `);
  doc.close();

  popups[popupId] = { win: popup, key: null, opId: null, component: null };
}

// Écouter les messages des popups
window.addEventListener('message', (e) => {
  const msg = e.data;
  if (!msg.type) return;
  
  if (msg.type === 'popup_ready') {
    const ids = activeOpIds.length ? activeOpIds : Object.keys(opState).map(Number).sort((a,b)=>a-b);
    e.source.postMessage({ type: 'init_popup', popupId: msg.popupId, ops: ids }, '*');
    return;
  }
  
  if (msg.type === 'vty_connect') {
    send({ type: 'vty_connect', opId: msg.opId, component: msg.component });
    popups[msg.popupId].pending = { opId: msg.opId, component: msg.component };
  }
  else if (msg.type === 'vty_exec') {
    send({ type: 'vty_exec', key: msg.key, cmd: msg.cmd });
  }
  else if (msg.type === 'vty_disconnect') {
    send({ type: 'vty_disconnect', key: msg.key });
  }
});

// ═══ Helpers ═════════════════════════════════════════════════
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ═══ Boot ════════════════════════════════════════════════════
connectWs();
</script>
