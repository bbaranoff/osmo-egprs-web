<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>osmo_egprs — Operations Console</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap');

  /* ═══ Solarized Theme ═══ */
  [data-theme="dark"] {
    --base03: #002b36; --base02: #073642; --base01: #586e75;
    --base00: #657b83; --base0: #839496; --base1: #93a1a1;
    --base2: #eee8d5; --base3: #fdf6e3;
    --yellow: #b58900; --orange: #cb4b16; --red: #dc322f;
    --magenta: #d33682; --violet: #6c71c4; --blue: #268bd2;
    --cyan: #2aa198; --green: #859900;

    --bg-0: #001e26; --bg-1: #002b36; --bg-2: #073642; --bg-3: #0a4050;
    --border: #0d4f5a; --border-b: #11616e;
    --t0: #fdf6e3; --t1: #eee8d5; --t2: #93a1a1; --t3: #586e75;
    --term-bg: #001a20; --term-text: #93a1a1;
    --shadow: 0 4px 24px rgba(0,0,0,0.6);
    --hex-offset: #586e75; --hex-byte: #93a1a1; --hex-ascii: #859900;
    --hex-highlight: rgba(42,161,152,0.08);
  }
  [data-theme="light"] {
    --base03: #002b36; --base02: #073642; --base01: #586e75;
    --base00: #657b83; --base0: #839496; --base1: #93a1a1;
    --base2: #eee8d5; --base3: #fdf6e3;
    --yellow: #b58900; --orange: #cb4b16; --red: #dc322f;
    --magenta: #d33682; --violet: #6c71c4; --blue: #268bd2;
    --cyan: #2aa198; --green: #859900;

    --bg-0: #fdf6e3; --bg-1: #eee8d5; --bg-2: #e6dfca; --bg-3: #ddd6c1;
    --border: #d0c8b0; --border-b: #c0b898;
    --t0: #002b36; --t1: #073642; --t2: #586e75; --t3: #93a1a1;
    --term-bg: #002b36; --term-text: #93a1a1;
    --shadow: 0 4px 16px rgba(0,0,0,0.15);
    --hex-offset: #586e75; --hex-byte: #073642; --hex-ascii: #859900;
    --hex-highlight: rgba(42,161,152,0.06);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    height:100%; background:var(--bg-0); color:var(--t0);
    font-family:'Source Sans 3',system-ui,sans-serif;
    font-size:14px; overflow:hidden;
  }
  code, .mono, .vty-screen, .vty-input, .pkt-table, #cap-filter, .hex-dump {
    font-family:'Fira Code',monospace;
  }

  /* ═══ Layout ═══ */
  #app { display:flex; flex-direction:column; height:100vh; }

  /* ═══ Header ═══ */
  header {
    background:var(--bg-1); border-bottom:1px solid var(--border);
    display:flex; align-items:center; padding:0 16px; gap:12px;
    height:48px; flex-shrink:0;
  }
  .logo {
    font-family:'Fira Code',monospace; font-weight:700; font-size:16px;
    color:var(--green); letter-spacing:.06em;
  }
  .sep { width:1px; height:22px; background:var(--border-b); flex-shrink:0; }
  .htag {
    font-size:11px; padding:3px 10px; border-radius:4px;
    background:var(--bg-2); color:var(--t2); white-space:nowrap;
    font-family:'Fira Code',monospace;
  }
  .htag.on { background:rgba(133,153,0,0.15); color:var(--green); }
  .hright { margin-left:auto; display:flex; align-items:center; gap:8px; }
  .btn {
    background:var(--bg-2); border:1px solid var(--border-b); color:var(--t1);
    font-family:'Source Sans 3',sans-serif; font-size:12px; font-weight:600;
    padding:5px 14px; cursor:pointer; border-radius:4px; transition:all .12s;
    white-space:nowrap;
  }
  .btn:hover { background:var(--bg-3); color:var(--t0); }
  .btn.primary { border-color:rgba(133,153,0,0.4); }
  .btn.primary:hover { background:rgba(133,153,0,0.15); color:var(--green); }
  .btn.danger:hover { background:rgba(220,50,47,0.15); color:var(--red); }
  .btn.vty-btn { border-color:rgba(42,161,152,0.4); }
  .btn.vty-btn:hover { background:rgba(42,161,152,0.15); color:var(--cyan); }
  .theme-btn {
    background:var(--bg-2); border:1px solid var(--border-b); color:var(--t2);
    width:34px; height:34px; border-radius:50%; cursor:pointer;
    display:flex; align-items:center; justify-content:center; font-size:16px;
    transition:all .2s;
  }
  .theme-btn:hover { background:var(--bg-3); color:var(--t0); }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; vertical-align:middle; margin-right:5px; }
  .dot.on { background:var(--green); box-shadow:0 0 6px rgba(133,153,0,0.4); }
  .dot.off { background:var(--red); box-shadow:0 0 6px rgba(220,50,47,0.3); }

  /* ═══ Main ═══ */
  #main {
    flex:1; display:grid;
    grid-template-columns:240px 1fr;
    grid-template-rows:1fr;
    min-height:0; overflow:hidden;
  }

  /* ═══ Panels ═══ */
  .panel { background:var(--bg-1); display:flex; flex-direction:column; overflow:hidden; min-height:0; }
  .ph {
    display:flex; align-items:center; padding:8px 12px; background:var(--bg-2);
    border-bottom:1px solid var(--border); gap:8px; flex-shrink:0;
  }
  .ph h2 {
    font-size:11px; font-weight:700; letter-spacing:.08em;
    text-transform:uppercase; color:var(--t3);
    font-family:'Fira Code',monospace;
  }
  .ph .badge {
    font-size:10px; padding:2px 8px; border-radius:10px;
    background:var(--bg-3); color:var(--t2); margin-left:auto;
    font-family:'Fira Code',monospace;
  }
  .ph .badge.live { background:rgba(133,153,0,0.15); color:var(--green); }
  .pb { flex:1; overflow-y:auto; padding:6px; min-height:0; }
  .pb::-webkit-scrollbar { width:6px; }
  .pb::-webkit-scrollbar-track { background:var(--bg-1); }
  .pb::-webkit-scrollbar-thumb { background:var(--bg-3); border-radius:3px; }

  /* ═══ Left: Operators ═══ */
  #op-panel { grid-row:1; grid-column:1; border-right:1px solid var(--border); }
  .op-card { margin:4px 0; background:var(--bg-2); border:1px solid var(--border); border-radius:5px; overflow:hidden; }
  .op-card.on { border-left:3px solid var(--green); }
  .op-card.off { border-left:3px solid var(--t3); opacity:.4; }
  .op-head { padding:10px 12px; cursor:pointer; display:flex; align-items:center; gap:8px; }
  .op-head .id { font-family:'Fira Code',monospace; font-weight:700; color:var(--cyan); font-size:14px; }
  .op-head .ms { font-size:11px; color:var(--t2); margin-left:auto; font-family:'Fira Code',monospace; }
  .op-head .sms-dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-left:4px; }
  .op-head .sms-dot.up { background:var(--green); }
  .op-head .sms-dot.down { background:var(--red); }
  .op-detail { display:none; padding:6px 12px 10px; font-size:12px; color:var(--t2); border-top:1px solid var(--border); }
  .op-card.expanded .op-detail { display:block; }
  .op-row { display:flex; justify-content:space-between; padding:2px 0; }
  .op-row .v { color:var(--t1); font-family:'Fira Code',monospace; font-size:11px; }
  .ms-chip {
    display:inline-block; font-family:'Fira Code',monospace;
    font-size:10px; padding:2px 6px; margin:2px; border-radius:3px;
    background:var(--bg-3); color:var(--yellow);
  }

  /* ═══ Capture area ═══ */
  #capture-area { grid-row:1; grid-column:2; display:flex; flex-direction:column; overflow:hidden; }
  #cap-toolbar {
    display:flex; align-items:center; padding:6px 10px; gap:8px;
    background:var(--bg-2); border-bottom:1px solid var(--border); flex-shrink:0;
  }
  #cap-filter {
    flex:1; min-width:120px;
    background:var(--bg-1); border:1px solid var(--border-b); color:var(--t0);
    font-size:12px; padding:6px 10px; outline:none; border-radius:4px;
  }
  #cap-filter:focus { border-color:var(--cyan); }
  #cap-filter::placeholder { color:var(--t3); }

  #pkt-list-wrap { flex:1; overflow-y:auto; min-height:0; }
  .pkt-table { width:100%; border-collapse:collapse; font-size:12px; }
  .pkt-table thead { position:sticky; top:0; z-index:1; }
  .pkt-table th {
    background:var(--bg-2); color:var(--t3); font-weight:700; text-align:left;
    padding:5px 8px; font-size:10px; letter-spacing:.06em; text-transform:uppercase;
    border-bottom:1px solid var(--border); font-family:'Fira Code',monospace;
  }
  .pkt-table td {
    padding:4px 8px; border-bottom:1px solid var(--bg-2);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer;
  }
  .pkt-table tr:hover { background:var(--bg-2); }
  .pkt-table tr.selected { background:rgba(42,161,152,0.1); }
  .pkt-table tr.flash { animation: pktFlash .4s; }
  @keyframes pktFlash { 0%{background:rgba(133,153,0,0.1)} 100%{background:transparent} }

  .proto { display:inline-block; padding:2px 6px; border-radius:3px; font-size:10px; font-weight:600; font-family:'Fira Code',monospace; }
  .proto-gsmtap { background:rgba(42,161,152,0.12); color:var(--cyan); }
  .proto-sctp   { background:rgba(108,113,196,0.12); color:var(--violet); }
  .proto-rr     { background:rgba(42,161,152,0.12); color:var(--cyan); }
  .proto-mm     { background:rgba(108,113,196,0.12); color:var(--violet); }
  .proto-cc     { background:rgba(211,54,130,0.12); color:var(--magenta); }
  .proto-sms    { background:rgba(133,153,0,0.12); color:var(--green); }
  .proto-dtap   { background:rgba(38,139,210,0.12); color:var(--blue); }
  .proto-m3ua   { background:rgba(203,75,22,0.12); color:var(--orange); }
  .proto-def    { background:var(--bg-3); color:var(--t1); }

  /* ═══ Packet detail ═══ */
  #pkt-detail-wrap {
    height:220px; min-height:80px; max-height:60%;
    border-top:2px solid var(--border-b); background:var(--bg-1);
    flex-shrink:0; resize:vertical; display:flex; flex-direction:column; overflow:hidden;
  }
  #detail-tabs {
    display:flex; gap:0; background:var(--bg-2); border-bottom:1px solid var(--border); flex-shrink:0;
  }
  #detail-tabs button {
    background:none; border:none; border-bottom:2px solid transparent;
    color:var(--t3); font-size:11px; font-weight:700; padding:7px 16px;
    cursor:pointer; font-family:'Source Sans 3',sans-serif;
    text-transform:uppercase; letter-spacing:.05em;
  }
  #detail-tabs button.active { color:var(--cyan); border-bottom-color:var(--cyan); }
  #detail-tabs button:hover { color:var(--t1); }
  #detail-content { flex:1; overflow-y:auto; min-height:0; }

  #pkt-detail {
    padding:8px 10px; font-family:'Fira Code',monospace; font-size:11px; line-height:1.8;
  }
  .layer-group { margin:2px 0; }
  .layer-name {
    cursor:pointer; font-weight:700; color:var(--cyan);
    padding:3px 6px; border-radius:3px; display:flex; align-items:center; gap:6px;
  }
  .layer-name:hover { background:var(--bg-2); }
  .layer-name .arrow { font-size:9px; color:var(--t3); transition:transform .15s; display:inline-block; }
  .layer-name .arrow.open { transform:rotate(90deg); }
  .layer-fields { padding-left:18px; display:none; }
  .layer-fields.open { display:block; }
  .field-row { color:var(--t2); padding:1px 6px; border-radius:2px; }
  .field-row:hover { background:var(--bg-2); }
  .field-key { color:var(--t1); }
  .field-val { color:var(--yellow); margin-left:6px; }

  .hex-dump {
    padding:10px 12px; font-size:11px; line-height:1.7;
    color:var(--hex-byte); white-space:pre; overflow-x:auto;
  }
  .hex-line { display:flex; gap:0; }
  .hex-line:hover { background:var(--hex-highlight); }
  .hex-offset { color:var(--hex-offset); min-width:60px; user-select:none; }
  .hex-bytes { min-width:380px; letter-spacing:.5px; }
  .hex-bytes .b:hover { background:rgba(42,161,152,0.15); border-radius:2px; }
  .hex-ascii { color:var(--hex-ascii); margin-left:12px; }
  .hex-ascii .np { color:var(--t3); }

  /* ═══ Floating VTY Windows ═══ */
  .vty-popup {
    position:fixed; z-index:200;
    width:660px; height:400px; min-width:400px; min-height:250px;
    background:var(--bg-1); border:1px solid var(--border-b);
    border-radius:8px; box-shadow:var(--shadow);
    display:flex; flex-direction:column; overflow:hidden;
    resize:both;
  }
  .vty-popup-header {
    display:flex; align-items:center; padding:6px 10px; gap:6px;
    background:var(--bg-2); border-bottom:1px solid var(--border);
    cursor:move; flex-shrink:0; user-select:none;
  }
  .vty-popup-header .title {
    font-family:'Fira Code',monospace; font-size:12px; font-weight:700;
    color:var(--cyan); flex:1;
  }
  .vty-popup-header select {
    background:var(--bg-3); border:1px solid var(--border-b); color:var(--t0);
    font-family:'Fira Code',monospace; font-size:11px; padding:3px 6px;
    outline:none; border-radius:3px;
  }
  .vty-popup-header .close-btn {
    background:none; border:none; color:var(--red); font-size:16px;
    cursor:pointer; padding:2px 6px; border-radius:3px;
  }
  .vty-popup-header .close-btn:hover { background:rgba(220,50,47,0.15); }
  .vty-screen {
    flex:1; overflow-y:auto; padding:8px 10px;
    font-family:'Fira Code',monospace; font-size:13px; line-height:1.6;
    background:var(--term-bg); color:var(--term-text);
    white-space:pre-wrap; word-break:break-all; min-height:0;
  }
  .vty-screen .err { color:var(--red); }
  .vty-screen .sys { color:var(--cyan); font-style:italic; }
  .vty-screen .cmd { color:var(--yellow); }
  .vty-input-row {
    display:flex; border-top:1px solid var(--border); flex-shrink:0; background:var(--bg-2);
  }
  .vty-input-row .prm {
    padding:7px 10px; color:var(--green); font-family:'Fira Code',monospace;
    font-weight:700; font-size:13px; white-space:nowrap;
  }
  .vty-input-row input {
    flex:1; background:transparent; border:none; color:var(--t0);
    font-family:'Fira Code',monospace; font-size:13px; padding:7px 0; outline:none;
  }

  /* ═══ Packet Popup ═══ */
  .pkt-popup { width:740px; height:500px; }
  .detail-tabs-pop {
    display:flex; background:var(--bg-2); border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .detail-tabs-pop button {
    background:none; border:none; border-bottom:2px solid transparent;
    color:var(--t3); font-size:11px; font-weight:700; padding:7px 16px;
    cursor:pointer; font-family:'Source Sans 3',sans-serif;
    text-transform:uppercase; letter-spacing:.05em;
  }
  .detail-tabs-pop button.active { color:var(--cyan); border-bottom-color:var(--cyan); }
  .detail-tabs-pop button:hover  { color:var(--t1); }
  .pkt-popup-body { flex:1; overflow-y:auto; min-height:0; }

  /* ═══ Responsive ═══ */
  @media (max-width:900px) {
    #main { grid-template-columns:1fr; }
    #op-panel { display:none; }
    .vty-popup { width:90vw; left:5vw !important; }
  }
  @media (min-width:1800px) {
    #main { grid-template-columns:300px 1fr; }
    .pkt-table { font-size:13px; }
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <span class="logo">⎔ OSMO_EGPRS</span>
    <span class="sep"></span>
    <span class="htag" id="tag-ops">0 ops</span>
    <span class="htag" id="tag-tshark">tshark off</span>
    <div class="hright">
      <button class="btn primary" onclick="send({type:'tshark_start'})" title="Start capture">▶ Capture</button>
      <button class="btn danger" onclick="send({type:'tshark_stop'})" title="Stop capture">■ Stop</button>
      <button class="btn" onclick="send({type:'poll'})">⟳ Refresh</button>
      <button class="btn" onclick="clearPackets()">Clear</button>
      <button class="btn vty-btn" onclick="spawnVty()">⌨ VTY</button>
      <button class="theme-btn" onclick="toggleTheme()" id="theme-toggle">◐</button>
      <span style="font-size:11px;color:var(--t3)"><span class="dot off" id="ws-dot"></span><span id="ws-txt">—</span></span>
    </div>
  </header>

  <div id="main">
    <div class="panel" id="op-panel">
      <div class="ph"><h2>Operators</h2><span class="badge" id="op-count">0</span></div>
      <div class="pb" id="op-list"></div>
    </div>

    <div id="capture-area">
      <div id="cap-toolbar">
        <input type="text" id="cap-filter" placeholder="Filter: ul, dl, op=1, sctp, rr, sms …" spellcheck="false">
        <span style="font-size:11px;color:var(--t3);white-space:nowrap;font-family:'Fira Code',monospace" id="pkt-counter">0 pkts</span>
      </div>
      <div id="pkt-list-wrap">
        <table class="pkt-table">
          <thead><tr>
            <th style="width:40px">#</th>
            <th style="width:70px">TIME</th>
            <th style="width:40px">DIR</th>
            <th style="width:55px">OP</th>
            <th style="width:80px">PROTO</th>
            <th style="width:40px">LEN</th>
            <th>INFO</th>
          </tr></thead>
          <tbody id="pkt-tbody"></tbody>
        </table>
      </div>
      <div id="pkt-detail-wrap">
        <div class="ph"><h2>Packet Detail</h2><span class="badge" id="detail-badge">—</span></div>
        <div id="detail-tabs">
          <button class="active" onclick="switchDetailTab('decode')">Decode</button>
          <button onclick="switchDetailTab('hex')">Hex Dump</button>
          <button onclick="switchDetailTab('raw')">Raw JSON</button>
        </div>
        <div id="detail-content">
          <div id="pkt-detail"><span style="color:var(--t3)">Click a packet to inspect</span></div>
          <div id="pkt-hex" style="display:none" class="hex-dump"></div>
          <div id="pkt-raw" style="display:none" class="hex-dump"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- VTY popup container -->
<div id="vty-layer"></div>

<script>
// ═══ Theme ═══
function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  document.getElementById('theme-toggle').textContent = next === 'dark' ? '◐' : '◑';
  try { localStorage.setItem('osmo-theme', next); } catch {}
}
try {
  const saved = localStorage.getItem('osmo-theme');
  if (saved) { document.documentElement.dataset.theme = saved; document.getElementById('theme-toggle').textContent = saved === 'dark' ? '◐' : '◑'; }
} catch {}

// ═══ Detail tab switching ═══
let currentDetailTab = 'decode';
let currentDetailPacket = null;

function switchDetailTab(tab) {
  currentDetailTab = tab;
  document.querySelectorAll('#detail-tabs button').forEach(b => b.classList.remove('active'));
  document.querySelector(`#detail-tabs button:nth-child(${tab==='decode'?1:tab==='hex'?2:3})`).classList.add('active');
  document.getElementById('pkt-detail').style.display = tab==='decode'?'block':'none';
  document.getElementById('pkt-hex').style.display = tab==='hex'?'block':'none';
  document.getElementById('pkt-raw').style.display = tab==='raw'?'block':'none';
  if (currentDetailPacket) renderDetailForTab(currentDetailPacket);
}

// ═══ WebSocket ═══
const WS_URL = `ws://${location.hostname}:${location.port||80}`;
let ws = null;
let opState = {}, activeOpIds = [];
let reconnectDelay = 1000;
let captureRunning = false;   // état réel de la capture (piloté par tshark_status)

function connectWs() {
  ws = new WebSocket(WS_URL);
  ws.binaryType = 'arraybuffer';
  ws.onopen = () => { setWs(true); reconnectDelay = 1000; };
  ws.onmessage = e => {
    handle(JSON.parse(e.data));
  };
  ws.onclose = () => { setWs(false); setTimeout(connectWs, reconnectDelay); reconnectDelay = Math.min(reconnectDelay*1.5, 10000); };
  ws.onerror = () => {};
}
function setWs(on) {
  document.getElementById('ws-dot').className = 'dot '+(on?'on':'off');
  document.getElementById('ws-txt').textContent = on?'LIVE':'…';
}
function send(msg) { if (ws && ws.readyState===1) ws.send(JSON.stringify(msg)); }

// ═══ Message Router ═══
function handle(msg) {
  switch(msg.type) {
    case 'init':
      activeOpIds = msg.data.activeOpIds||[];
      updateOps(msg.data.operators);
      setCaptureRunning(msg.data.tsharkActive || false);
      break;
    case 'state':
      activeOpIds = msg.data.activeOpIds||activeOpIds;
      updateOps(msg.data.operators);
      break;
    case 'tshark_status':
      setCaptureRunning(msg.data.active);
      break;
    case 'packet': addPacket(msg.data); break;
    case 'tshark_stopped':
      setCaptureRunning(false);
      break;
    case 'tshark_error':
      setCaptureRunning(false);
      document.getElementById('tag-tshark').textContent='tshark ERR';
      break;
    case 'packet_hex':
      onPacketHex(msg.data);
      break;
    case 'packet_dissect':
      onPacketDissect(msg.data);
      break;
    case 'vty_connected': vtyOnConnected(msg.data); break;
    case 'vty_data': vtyOnData(msg.data); break;
    case 'vty_error': vtyOnError(msg.data); break;
    case 'vty_disconnected': vtyOnDisc(msg.data); break;
  }
}

function setCaptureRunning(on) {
  captureRunning = on;
  setTsharkTag(on);
}

function setTsharkTag(on) {
  const el = document.getElementById('tag-tshark');
  el.textContent = on ? 'tshark ●' : 'tshark off';
  el.className = 'htag' + (on?' on':'');
}

// ═══ Packet Capture ═══
let packets = [];
const MAX_PKT = 3000;
let filterText = '';

document.getElementById('cap-filter').addEventListener('input', e => {
  filterText = e.target.value.toLowerCase().trim();
  rebuildPktTable();
});

function matchFilter(p) {
  if (!filterText) return true;
  const f = filterText;
  if (f==='ul') return p.direction==='UL' || p.uplink;
  if (f==='dl') return p.direction==='DL' || !p.uplink;
  const om = f.match(/^op\s*=?\s*(\d+)$/i);
  if (om) return (p.opLabel||'').toLowerCase().includes('op'+om[1]);
  return `${p.protocol} ${p.info} ${p.opLabel} ${p.direction} ${p.src} ${p.dst} ${p.arfcn}`.toLowerCase().includes(f);
}

function addPacket(p) {
  packets.push(p);
  if (packets.length > MAX_PKT) packets = packets.slice(-MAX_PKT/2);
  document.getElementById('pkt-counter').textContent = packets.length+' pkts';
  // Ne pas appeler setTsharkTag ici — piloté uniquement par tshark_status/tshark_stopped
  if (!matchFilter(p)) return;
  const tbody = document.getElementById('pkt-tbody');
  tbody.appendChild(makePktRow(p));
  while (tbody.children.length > 800) tbody.removeChild(tbody.firstChild);
  const wrap = document.getElementById('pkt-list-wrap');
  if (wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight < 60) wrap.scrollTop = wrap.scrollHeight;
}

function makePktRow(p) {
  const tr = document.createElement('tr');
  tr.className = 'flash';
  tr.onclick = () => {
    document.querySelectorAll('.pkt-table tr.selected').forEach(r=>r.classList.remove('selected'));
    tr.classList.add('selected');
    selectPacket(p);
  };
  tr.ondblclick = (e) => { e.stopPropagation(); spawnPktPopup(p); };
  const ts = typeof p.ts==='number' ? p.ts.toFixed(3) : '—';
  const pc = (p.protocol||'').toLowerCase();
  const cls = pc.includes('sctp')?'proto-sctp':pc.includes('m3ua')?'proto-m3ua':pc.includes('gsmtap')?'proto-gsmtap':pc.includes('rr')?'proto-rr':pc.includes('sms')?'proto-sms':pc.includes('dtap')?'proto-dtap':'proto-def';
  const dir = p.direction || (p.uplink ? 'UL' : 'DL');
  const dirCls = dir === 'UL' ? 'color:var(--red);font-weight:700' : dir === 'DL' ? 'color:var(--green);font-weight:700' : 'color:var(--t2)';
  const opLabel = p.opLabel || '—';
  tr.innerHTML = `<td style="color:var(--t3)">${p.id}</td><td style="color:var(--t2);font-size:11px">${ts}</td><td style="${dirCls};font-size:11px">${esc(dir)}</td><td style="color:var(--cyan);font-size:11px;font-weight:600">${esc(opLabel)}</td><td><span class="proto ${cls}">${esc(p.protocol||'—')}</span></td><td style="color:var(--t3)">${p.length||''}</td><td style="color:var(--t1);max-width:500px;overflow:hidden;text-overflow:ellipsis">${esc(p.info||'')}</td>`;
  return tr;
}

function selectPacket(p) {
  currentDetailPacket = p;
  document.getElementById('detail-badge').textContent = '#'+p.id+' '+p.protocol;
  // Si pas encore de layers, les demander au serveur
  if (!p.layers && p.frameNum) {
    send({ type: 'packet_dissect_request', frameNum: p.frameNum });
  }
  renderDetailForTab(p);
}

function onPacketDissect(data) {
  // Stocker les layers dans le paquet correspondant
  const p = packets.find(function(pk){ return pk.frameNum === data.frameNum; });
  if (p) p.layers = data.layers;
  // Re-rendre si c'est le paquet courant en onglet decode
  if (currentDetailPacket && currentDetailPacket.frameNum === data.frameNum) {
    currentDetailPacket.layers = data.layers;
    if (currentDetailTab === 'decode') renderDecode(currentDetailPacket);
  }
  // Re-rendre les popups ouverts sur ce paquet
  document.querySelectorAll('[data-pkt-frame="' + data.frameNum + '"]').forEach(function(el) {
    if (p) { p.layers = data.layers; }
    var decodeEl = el.querySelector('.pkt-popup-decode');
    if (decodeEl) renderDecodeInto({ layers: data.layers }, decodeEl);
  });
}

function renderDetailForTab(p) {
  if (currentDetailTab === 'decode') renderDecode(p);
  else if (currentDetailTab === 'hex') renderHexDump(p);
  else renderRawJson(p);
}

function renderDecode(p) {
  const el = document.getElementById('pkt-detail');
  if (!p.layers) {
    el.innerHTML = '<span style="color:var(--t3)">Chargement dissection…</span>';
    if (p.frameNum) send({ type:'packet_dissect_request', frameNum: p.frameNum });
    return;
  }
  renderDecodeInto(p, el);
}

function renderDecodeInto(p, el) {
  if (!p.layers || Object.keys(p.layers).length === 0) {
    el.innerHTML = '<span style="color:var(--t3)">No decode data</span>';
    return;
  }
  let h = '';
  for (const [ln, fields] of Object.entries(p.layers)) {
    if (ln.endsWith('_raw')) continue;
    h += `<div class="layer-group"><div class="layer-name" onclick="togLayer(this)"><span class="arrow">&#9658;</span> ${esc(ln)}</div><div class="layer-fields">`;
    if (typeof fields === 'object' && fields !== null) {
      for (const [k, v] of Object.entries(fields)) {
        if (k.endsWith('_raw') || k.endsWith('_tree')) continue;
        const val = Array.isArray(v) ? v.join(', ') : String(v);
        // Strip layer prefix — tshark JSON: "frame.time_epoch" sous layer "frame"
        const lnEsc = ln.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const sk = k.replace(new RegExp('^' + lnEsc + '[._]'), '') || k;
        h += `<div class="field-row"><span class="field-key">${esc(sk)}</span>:<span class="field-val">${esc(val)}</span></div>`;
      }
    } else if (fields !== null && fields !== undefined) {
      h += `<div class="field-row"><span class="field-val">${esc(String(fields))}</span></div>`;
    }
    h += '</div></div>';
  }
  el.innerHTML = h || '<span style="color:var(--t3)">No fields</span>';
  const first = el.querySelector('.layer-name');
  if (first) togLayer(first);
}

function renderHexDump(p) {
  const el = document.getElementById('pkt-hex');
  if (p.hexDump) {
    _renderHex(el, p.hexDump);
  } else if (p.frameNum) {
    el.innerHTML = '<span style="color:var(--t3)">Chargement hex…</span>';
    send({ type: 'packet_hex_request', frameNum: p.frameNum });
  } else {
    el.innerHTML = '<span style="color:var(--t3)">No hex data</span>';
  }
}

function _renderHex(el, hexDump) {
  const hex = hexDump.replace(/[^0-9a-fA-F]/g,'');
  const bytes = [];
  for (let i=0;i<hex.length;i+=2) bytes.push(parseInt(hex.substr(i,2),16));
  let html='';
  for (let off=0;off<bytes.length;off+=16) {
    const row=bytes.slice(off,off+16);
    const os=off.toString(16).padStart(4,'0');
    let hp='',ap='';
    for (let i=0;i<16;i++) {
      if (i<row.length) { const b=row[i]; hp+=`<span class="b">${b.toString(16).padStart(2,'0')}</span> `; if(i===7)hp+=' '; ap+=(b>=32&&b<=126)?String.fromCharCode(b):'<span class="np">.</span>'; }
      else { hp+='   '; if(i===7)hp+=' '; ap+=' '; }
    }
    html+=`<div class="hex-line"><span class="hex-offset">${os}</span><span class="hex-bytes">${hp}</span><span class="hex-ascii">${ap}</span></div>`;
  }
  el.innerHTML=html;
}

function onPacketHex(data) {
  const p = packets.find(pk => pk.frameNum === data.frameNum);
  if (p) p.hexDump = data.hex;
  // Panel bas
  if (currentDetailPacket && currentDetailPacket.frameNum === data.frameNum && currentDetailTab === 'hex') {
    _renderHex(document.getElementById('pkt-hex'), data.hex);
  }
  // Popups en attente (dataset.frameNum posé lors de l'ouverture)
  document.querySelectorAll('[data-frame-num="' + data.frameNum + '"]').forEach(el => {
    _renderHex(el, data.hex);
    delete el.dataset.frameNum;
  });
}

function renderRawJson(p) {
  const el=document.getElementById('pkt-raw');
  const c={...p}; delete c.hexDump;
  el.textContent=JSON.stringify(c,null,2);
}

function togLayer(el) {
  const f=el.nextElementSibling;
  const o=f.classList.toggle('open');
  el.querySelector('.arrow').classList.toggle('open',o);
}

function clearPackets() {
  packets=[];
  document.getElementById('pkt-tbody').innerHTML='';
  document.getElementById('pkt-counter').textContent='0 pkts';
  document.getElementById('pkt-detail').innerHTML='<span style="color:var(--t3)">Click a packet to inspect</span>';
  document.getElementById('pkt-hex').innerHTML='';
  document.getElementById('pkt-raw').textContent='';
  document.getElementById('detail-badge').textContent='—';
  currentDetailPacket=null;
}

function rebuildPktTable() {
  const tbody=document.getElementById('pkt-tbody');
  tbody.innerHTML='';
  packets.filter(matchFilter).slice(-800).forEach(p=>tbody.appendChild(makePktRow(p)));
}

// ═══ Packet Popup (double-clic) ═══
let pktPopCounter = 0;

function spawnPktPopup(p) {
  pktPopCounter++;
  const wid = 'pktpop-' + pktPopCounter;
  const layer = document.getElementById('vty-layer');
  const offset = (pktPopCounter - 1) * 32;
  const top  = 90  + (offset % 180);
  const left = 260 + (offset % 320);

  const pc  = (p.protocol || '').toLowerCase();
  const cls = pc.includes('sctp') ? 'proto-sctp' : pc.includes('m3ua') ? 'proto-m3ua' :
              pc.includes('gsmtap') ? 'proto-gsmtap' : pc.includes('rr') ? 'proto-rr' :
              pc.includes('sms') ? 'proto-sms' : pc.includes('dtap') ? 'proto-dtap' : 'proto-def';
  const dir    = p.direction || (p.uplink ? 'UL' : 'DL');
  const dirCol = dir === 'UL' ? 'var(--red)' : dir === 'DL' ? 'var(--green)' : 'var(--t2)';

  const div = document.createElement('div');
  div.className = 'vty-popup pkt-popup';
  div.id = wid;
  div.dataset.pktFrame = p.frameNum;
  div.style.cssText = `top:${top}px;left:${left}px;z-index:210`;

  div.innerHTML = `
    <div class="vty-popup-header" onmousedown="startDrag(event,'${wid}')">
      <span class="proto ${cls}" style="font-size:10px;flex-shrink:0">${esc(p.protocol||'—')}</span>
      <span style="font-size:10px;color:${dirCol};font-weight:700;font-family:'Fira Code',monospace;flex-shrink:0;margin:0 4px">${esc(dir)}</span>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;font-size:11px;font-family:'Fira Code',monospace;color:var(--cyan)">#${p.id} — ${esc((p.info||'').slice(0,80))}</span>
      <span style="font-size:10px;color:var(--t3);font-family:'Fira Code',monospace;margin-right:6px">${esc(p.opLabel||'')}</span>
      <button class="close-btn" onclick="document.getElementById('${wid}').remove()">✕</button>
    </div>
    <div class="detail-tabs-pop">
      <button class="active" onclick="pktPopTab('${wid}','decode',this)">Decode</button>
      <button onclick="pktPopTab('${wid}','hex',this)">Hex Dump</button>
      <button onclick="pktPopTab('${wid}','raw',this)">Raw JSON</button>
    </div>
    <div id="${wid}-decode" class="pkt-popup-body pkt-popup-decode" style="padding:8px 10px;font-family:'Fira Code',monospace;font-size:11px;line-height:1.8">
      <span style="color:var(--t3)">Chargement dissection…</span>
    </div>
    <div id="${wid}-hex" class="pkt-popup-body hex-dump" style="display:none"></div>
    <div id="${wid}-raw" class="pkt-popup-body hex-dump" style="display:none"></div>`;

  layer.appendChild(div);
  document.querySelectorAll('.vty-popup').forEach(pp => pp.style.zIndex = 200);
  div.style.zIndex = 210;

  // Decode — utilise les layers déjà présents ou demande au serveur
  const decodeEl = document.getElementById(wid + '-decode');
  if (p.layers) {
    renderDecodeInto(p, decodeEl);
  } else if (p.frameNum) {
    send({ type: 'packet_dissect_request', frameNum: p.frameNum });
  }

  // Hex
  const hexEl = document.getElementById(wid + '-hex');
  if (p.hexDump) {
    _renderHex(hexEl, p.hexDump);
  } else if (p.frameNum) {
    hexEl.setAttribute('data-frame-num', p.frameNum);
    send({ type: 'packet_hex_request', frameNum: p.frameNum });
  }

  // Raw JSON
  const c = Object.assign({}, p); delete c.hexDump;
  document.getElementById(wid + '-raw').textContent = JSON.stringify(c, null, 2);
}

function pktPopTab(wid, tab, btn) {
  ['decode','hex','raw'].forEach(t => {
    const el = document.getElementById(wid + '-' + t);
    if (el) el.style.display = t === tab ? 'block' : 'none';
  });
  const tabsEl = document.querySelector('#' + wid + ' .detail-tabs-pop');
  if (tabsEl) tabsEl.querySelectorAll('button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ═══ VTY Popup Windows ═══
let vtyCounter = 0;
const vtyWindows = {};

function spawnVty() {
  vtyCounter++;
  const wid = 'vty-'+vtyCounter;
  const layer = document.getElementById('vty-layer');

  // Stagger position
  const offset = (vtyCounter-1) * 30;
  const top = 80 + (offset % 200);
  const left = 200 + (offset % 300);

  const div = document.createElement('div');
  div.className = 'vty-popup';
  div.id = wid;
  div.style.top = top+'px';
  div.style.left = left+'px';
  div.innerHTML = `
    <div class="vty-popup-header" onmousedown="startDrag(event,'${wid}')">
      <span class="title">VTY #${vtyCounter}</span>
      <select class="vty-op-sel" data-wid="${wid}"><option value="">OP…</option></select>
      <select class="vty-comp-sel" data-wid="${wid}">
        <option value="bsc">BSC</option><option value="msc">MSC</option><option value="hlr">HLR</option>
        <option value="bts">BTS</option><option value="mgw">MGW</option><option value="stp">STP</option>
        <option value="sgsn">SGSN</option><option value="ggsn">GGSN</option><option value="pcu">PCU</option>
        <option value="baseband">BB</option>
      </select>
      <button class="btn primary" style="padding:3px 10px;font-size:11px" onclick="vtyPopConnect('${wid}')">Go</button>
      <button class="close-btn" onclick="vtyPopClose('${wid}')">✕</button>
    </div>
    <div class="vty-screen" id="${wid}-screen" style="display:none"></div>
    <div style="display:flex;align-items:center;justify-content:center;flex:1;color:var(--t3);font-size:12px;background:var(--term-bg)" id="${wid}-empty">Select OP + component → Go</div>
    <div class="vty-input-row">
      <span class="prm" id="${wid}-prm">$</span>
      <input type="text" placeholder="VTY command…" onkeydown="vtyPopKey(event,'${wid}')" autocomplete="off" spellcheck="false">
    </div>`;
  layer.appendChild(div);

  vtyWindows[wid] = { key:null, buffer:'', history:[], histIdx:-1 };
  updateVtySelects();
}

function vtyPopConnect(wid) {
  const popup = document.getElementById(wid);
  const opId = popup.querySelector('.vty-op-sel').value;
  const comp = popup.querySelector('.vty-comp-sel').value;
  if (!opId) return;
  const key = `${opId}-${comp}`;
  vtyWindows[wid].key = key;
  vtyWindows[wid].buffer = '';
  send({ type:'vty_connect', opId:parseInt(opId), component:comp });
}

function vtyPopClose(wid) {
  const w = vtyWindows[wid];
  if (w && w.key) send({ type:'vty_disconnect', key:w.key });
  delete vtyWindows[wid];
  const el = document.getElementById(wid);
  if (el) el.remove();
}

function vtyPopKey(e, wid) {
  const input = e.target;
  const w = vtyWindows[wid];
  if (!w) return;
  if (e.key==='Enter') {
    const cmd = input.value;
    if (!w.key) return;
    w.buffer += `\x1b[cmd]${cmd}\x1b[/]\r\n`;
    w.history.push(cmd); w.histIdx = w.history.length;
    send({ type:'vty_exec', key:w.key, cmd });
    input.value = '';
    renderVtyPop(wid);
  } else if (e.key==='ArrowUp') {
    e.preventDefault();
    if (w.histIdx>0) { w.histIdx--; input.value=w.history[w.histIdx]||''; }
  } else if (e.key==='ArrowDown') {
    e.preventDefault();
    if (w.histIdx<w.history.length-1) { w.histIdx++; input.value=w.history[w.histIdx]||''; }
    else { w.histIdx=w.history.length; input.value=''; }
  } else if (e.key==='Tab') {
    e.preventDefault();
    if (w.key) send({ type:'vty_exec', key:w.key, cmd:input.value+'?' });
  }
}

function renderVtyPop(wid) {
  const w = vtyWindows[wid];
  if (!w) return;
  const screen = document.getElementById(wid+'-screen');
  if (!screen) return;
  screen.innerHTML = w.buffer
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\x1b\[sys\](.*?)\x1b\[\/\]/gs, '<span class="sys">$1</span>')
    .replace(/\x1b\[err\](.*?)\x1b\[\/\]/gs, '<span class="err">$1</span>')
    .replace(/\x1b\[cmd\](.*?)\x1b\[\/\]/gs, '<span class="cmd">$1</span>');
  screen.scrollTop = screen.scrollHeight;
}

function findVtyWid(key) {
  for (const [wid, w] of Object.entries(vtyWindows)) {
    if (w.key === key) return wid;
  }
  return null;
}

function vtyOnConnected(d) {
  let wid = findVtyWid(d.key);
  if (!wid) {
    // Find a window without a key
    for (const [w, state] of Object.entries(vtyWindows)) {
      if (!state.key) { state.key = d.key; state.buffer = ''; wid = w; break; }
    }
    if (!wid) return;
  }
  const w = vtyWindows[wid];
  const retryNote = d.retry > 0 ? ` (retry ${d.retry})` : '';
  w.buffer += `\x1b[sys]Connected to op${d.opId}/${d.component}:${d.port}${retryNote}\x1b[/]\r\n`;
  document.getElementById(wid+'-empty').style.display='none';
  document.getElementById(wid+'-screen').style.display='block';
  document.getElementById(wid+'-prm').textContent = `op${d.opId}/${d.component}> `;
  const title = document.querySelector(`#${wid} .title`);
  if (title) title.textContent = `VTY op${d.opId}/${d.component}`;
  renderVtyPop(wid);
}

function vtyOnData(d) {
  const wid = findVtyWid(d.key);
  if (!wid) return;
  const w = vtyWindows[wid];
  w.buffer += d.data;
  if (w.buffer.length > 120000) w.buffer = w.buffer.slice(-80000);
  renderVtyPop(wid);
}

function vtyOnError(d) {
  const wid = findVtyWid(d.key);
  if (wid) { vtyWindows[wid].buffer += `\x1b[err]ERROR: ${d.msg}\x1b[/]\r\n`; renderVtyPop(wid); }
}

function vtyOnDisc(d) {
  const wid = findVtyWid(d.key);
  if (wid) {
    vtyWindows[wid].buffer += '\r\n--- disconnected ---\r\n';
    renderVtyPop(wid);
    vtyWindows[wid].key = null;
    document.getElementById(wid+'-prm').textContent = '$ ';
  }
}

// ═══ Dragging ═══
let dragState = null;

function startDrag(e, wid) {
  if (e.target.tagName === 'SELECT' || e.target.tagName === 'BUTTON') return;
  const el = document.getElementById(wid);
  dragState = { el, startX: e.clientX, startY: e.clientY, origLeft: el.offsetLeft, origTop: el.offsetTop };
  // Bring to front
  document.querySelectorAll('.vty-popup').forEach(p => p.style.zIndex = 200);
  el.style.zIndex = 201;
  e.preventDefault();
}

document.addEventListener('mousemove', e => {
  if (!dragState) return;
  const dx = e.clientX - dragState.startX;
  const dy = e.clientY - dragState.startY;
  dragState.el.style.left = (dragState.origLeft + dx) + 'px';
  dragState.el.style.top  = (dragState.origTop + dy) + 'px';
});

document.addEventListener('mouseup', () => { dragState = null; });

// ═══ Helpers ═══
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ═══ Init ═══
connectWs();
</script>
</body>
</html>
